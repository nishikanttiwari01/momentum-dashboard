[loggers]
keys=root,uvicorn,uvicorn.error,uvicorn.access,app,app.scan,app.screener,yfinance,sqlalchemy

[handlers]
keys=console,app_file,access_file,error_file

[formatters]
keys=std,access

[formatter_std]
format=%(asctime)s %(levelname)-8s %(name)s %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_access]
format=%(asctime)s %(levelname)-8s %(name)s %(client_addr)s - "%(request_line)s" %(status_code)s
datefmt=%Y-%m-%d %H:%M:%S

[handler_console]
class=StreamHandler
level=INFO
formatter=std
args=()                            

[handler_app_file]
class=logging.handlers.RotatingFileHandler
level=INFO
formatter=std
args=('logs/app.log','a',10485760,5,'utf-8')

[handler_access_file]
class=logging.handlers.RotatingFileHandler
level=INFO
formatter=access
args=('logs/access.log','a',10485760,5,'utf-8')

[handler_error_file]
class=logging.handlers.RotatingFileHandler
level=WARNING
formatter=std
args=('logs/error.log','a',10485760,5,'utf-8')

[logger_root]
level=INFO
handlers=console

[logger_uvicorn]
level=INFO
handlers=console
propagate=1
qualname=uvicorn

[logger_uvicorn.error]
level=INFO
handlers=console,error_file
propagate=0
qualname=uvicorn.error

[logger_uvicorn.access]
level=INFO
handlers=console,access_file
propagate=0
qualname=uvicorn.access

[logger_app]
level=INFO
handlers=console,app_file
propagate=0
qualname=app

[logger_app.scan]
level=INFO
handlers=console,app_file
propagate=0
qualname=app.scan

[logger_app.screener]
level=INFO
handlers=console,app_file
propagate=0
qualname=app.screener

[logger_yfinance]
level=WARNING
handlers=console,app_file
propagate=0
qualname=yfinance

[logger_sqlalchemy]
level=WARNING
handlers=console,app_file
propagate=0
qualname=sqlalchemy
