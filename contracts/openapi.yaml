openapi: 3.1.0
info:
  title: Momentum Dashboard API
  version: 0.7.0
  summary: OpenAPI-first contracts for React + FastAPI app (Parquet+SQLite).
  description: Contract-first spec. Clients must be generated from this file. All
    endpoints are local-only and authenticated as N/A for now.
servers:
- url: http://localhost:8000/api/v1
tags:
- name: Health
- name: Screener
- name: Runs
- name: Universe
- name: Instruments
- name: Positions
- name: Snapshots
- name: Alerts
- name: Watchlist
- name: History
- name: Settings
- name: Learning
- name: News
paths:
  /api/v1/health:
    get:
      tags:
      - Health
      operationId: health
      summary: Quick health (combined)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthState'
              examples:
                example:
                  $ref: '#/components/examples/Health'
  /api/v1/health/live:
    get:
      tags:
      - Health
      operationId: healthLive
      summary: Liveness probe
      responses:
        '200':
          description: Live
  /api/v1/health/ready:
    get:
      tags:
      - Health
      operationId: healthReady
      summary: Readiness probe (SQLite + Parquet availability)
      responses:
        '200':
          description: Ready
        '503':
          description: Not ready
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                example:
                  $ref: '#/components/examples/Problem503'
  /api/v1/health/metrics:
    get:
      tags:
      - Health
      operationId: metrics
      summary: Prometheus metrics (optional)
      responses:
        '200':
          description: Prometheus exposition
          content:
            text/plain:
              schema:
                type: string
  /api/v1/screener:
    get:
      tags:
      - Screener
      summary: List screener rows (filtered, sorted, paginated)
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: per_page
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 100
      - name: sort_by
        in: query
        schema:
          type: string
          enum:
          - score
          - pct_today
          - rsi
          - adx
          - proximity_52w_high
          - relvol20
          - price
          - name
          - sector
          - wk_change
          - wk_change_pct
          default: score
      - name: sort_dir
        in: query
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
      - name: universe
        in: query
        schema:
          type: string
          enum:
          - NIFTY50
          - NIFTY100
          - NIFTY500
          - MIDCAP
          - SMALLCAP
          - ALL
      - name: symbol
        in: query
        schema:
          type: string
        description: Exact ticker symbol (case-insensitive)
      - name: sector_in
        in: query
        schema:
          type: array
          items:
            type: string
        style: form
        explode: true
      - name: score_min
        in: query
        schema:
          type: number
      - name: rsi_min
        in: query
        schema:
          type: number
      - name: rsi_max
        in: query
        schema:
          type: number
      - name: adx_min
        in: query
        schema:
          type: number
      - name: price_min
        in: query
        schema:
          type: number
      - name: price_max
        in: query
        schema:
          type: number
      - name: pct_today_min
        in: query
        schema:
          type: number
      - name: proximity_52w_high_max
        in: query
        schema:
          type: number
          description: Within X% of 52W high if <= X
      - name: watchlist_only
        in: query
        schema:
          type: boolean
          default: false
      - name: stale_exclude
        in: query
        schema:
          type: boolean
          default: true
      - name: run_id
        in: query
        schema:
          type: string
          description: If omitted, server uses latest snapshot
      responses:
        '200':
          description: Screener result page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScreenerList'

  /api/v1/screener/top-movers:
    get:
      tags:
      - Screener
      summary: Top gainers and losers for the requested period
      operationId: getTopMovers
      parameters:
      - name: period
        in: query
        description: Period over which to compute percentage change
        schema:
          type: string
          enum: ["1d", "1w", "1m", "3m"]
          default: "1d"
      responses:
        '200':
          description: Top movers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopMovers'


  /api/v1/scan:
    post:
      tags:
      - Screener
      operationId: postScan
      summary: Start a manual screening run (idempotent)
      description: 'Triggers a new scores snapshot with a fresh run_id. If the same

        Idempotency-Key (or ScanRequest.key) is reused, returns the existing run.

        On first creation: 201 Created. On idempotent replay: 200 OK.

        '
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScanRequest'
      responses:
        '201':
          description: New run created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunDetail'
              example:
                example:
                  value:
                    run_id: '20250101153000'
                    job_name: manual_scan
                    started_at: '2025-01-01T15:30:00Z'
                    status: RUNNING
        '200':
          description: Idempotent replay (existing run returned)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunDetail'
        '422':
          description: Invalid Idempotency-Key or request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '429':
          description: Rate limited
          headers:
            Retry-After:
              $ref: '#/components/headers/RetryAfter'
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
  /api/v1/runs:
    get:
      tags:
      - Runs
      operationId: listRuns
      summary: List recent scan runs
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      - name: status
        in: query
        required: false
        schema:
          type: string
          enum:
          - PENDING
          - RUNNING
          - SUCCEEDED
          - FAILED
        description: Optional status filter
      responses:
        '200':
          description: Runs
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/RunSummary'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
              examples:
                example:
                  $ref: '#/components/examples/Runs'
  /api/v1/runs/{run_id}:
    get:
      tags:
      - Runs
      operationId: getRun
      summary: Run details
      parameters:
      - name: run_id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/RunId'
      responses:
        '200':
          description: Run detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunDetail'
              example:
                example:
                  value:
                    run_id: '20250101153000'
                    job_name: scan_every_15m
                    started_at: '2025-01-01T15:30:00Z'
                    ended_at: '2025-01-01T15:30:12Z'
                    status: SUCCEEDED
                    counts:
                      symbols_processed: 500
                      rows_written: 500
        '404':
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /api/v1/universe:
    get:
      tags:
      - Universe
      operationId: listUniverse
      summary: List/search universe (symbols)
      parameters:
      - $ref: '#/components/parameters/IfNoneMatch'
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      - name: q
        in: query
        schema:
          type: string
      - name: sector
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Universe list
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/UniverseInstrument'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
              examples:
                example:
                  $ref: '#/components/examples/UniverseList'
        '304':
          description: Not Modified
  /api/v1/universe/sectors:
    get:
      tags:
      - Universe
      operationId: listSectors
      summary: Sector facets with counts
      responses:
        '200':
          description: Sectors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SectorFacet'
              examples:
                example:
                  $ref: '#/components/examples/Sectors'
  /api/v1/instruments:
    get:
      tags:
      - Instruments
      operationId: listInstruments
      summary: Search/autocomplete instruments
      parameters:
      - name: q
        in: query
        schema:
          type: string
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Instruments
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/UniverseInstrument'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
  /api/v1/instruments/{symbol}/prices:
    get:
      tags:
      - Instruments
      operationId: getInstrumentPrices
      summary: Price slice for sparkline
      parameters:
      - $ref: '#/components/parameters/Symbol'
      - name: range
        in: query
        description: e.g., 30d, 90d, 1y
        schema:
          type: string
      responses:
        '200':
          description: OHLCV candles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PriceCandle'
  /api/v1/instruments/{symbol}/indicators:
    get:
      tags:
      - Instruments
      operationId: getInstrumentIndicators
      summary: Indicator slice for chart tabs
      parameters:
      - $ref: '#/components/parameters/Symbol'
      - name: range
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Indicator points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IndicatorPoint'
  /api/v1/positions:
    get:
      tags: [positions]
      summary: List positions (optionally filter by symbol)
      parameters:
        - in: query
          name: symbol
          required: false
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/PositionOut' }

    post:
      tags: [positions]
      summary: Lock a position (create-or-lock)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PositionCreate' }
      responses:
        "200":
          description: Locked
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PositionOut' }
        "400": { description: Invalid price or payload }

  /api/v1/positions/{symbol}:
    get:
      tags: [positions]
      summary: Get a position by symbol
      parameters:
        - in: path
          name: symbol
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PositionOut' }
        "404": { description: Not found }

  /api/v1/positions/{id}:
    put:
      tags: [positions]
      summary: Update mutable fields of a position
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PositionUpdate' }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PositionOut' }
        "404": { description: Not found }

    delete:
      tags: [positions]
      summary: Unlock (delete row)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Unlocked }
        "404": { description: Not found }


  /api/v1/snapshots/pin:
    post:
      tags:
      - Snapshots
      operationId: pinSnapshot
      summary: Pin a snapshot for a symbol
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SnapshotPinIn'
      responses:
        '201':
          description: Pinned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotPinOut'
  /api/v1/snapshots/pins:
    get:
      tags:
      - Snapshots
      operationId: listSnapshotPins
      summary: List pins (optionally by symbol)
      parameters:
      - name: symbol
        in: query
        schema:
          $ref: '#/components/schemas/Symbol'
      responses:
        '200':
          description: Pins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SnapshotPinOut'
              examples:
                example:
                  $ref: '#/components/examples/Pins'
  /api/v1/snapshots/pin/{id}:
    delete:
      tags:
      - Snapshots
      operationId: unpinSnapshot
      summary: Remove a pin
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '204':
          description: Unpinned
  /api/v1/alerts:
    get:
      tags:
      - Alerts
      operationId: listAlerts
      summary: List alert rules and states
      responses:
        '200':
          description: Alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AlertState'
              examples:
                example:
                  $ref: '#/components/examples/Alerts'
    post:
      tags:
      - Alerts
      operationId: createAlert
      summary: Create alert rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertRule'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertState'
  /api/v1/alerts/{id}:
    put:
      tags:
      - Alerts
      operationId: updateAlert
      summary: Update alert rule
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertRule'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertState'
    delete:
      tags:
      - Alerts
      operationId: deleteAlert
      summary: Delete alert rule
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '204':
          description: Deleted
  /api/v1/alerts/digest:
    get:
      tags:
      - Alerts
      operationId: previewAlertDigest
      summary: Preview digest (no send)
      responses:
        '200':
          description: Digest preview
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/instruments/{symbol}/detail:
    get:
      tags:
      - Instruments
      summary: Get instrument drawer detail (backend-only)
      parameters:
      - name: symbol
        in: path
        required: true
        schema:
          type: string
        description: Canonical symbol, e.g. TCS.NS
      - name: run_id
        in: query
        required: false
        schema:
          type: string
        description: Use a specific snapshot; defaults to pinned or latest
      responses:
        '200':
          description: Drawer detail payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DrawerDetail'
              examples:
                default:
                  $ref: '#/components/examples/DrawerDetailExample'
  /api/v1/watchlist:
    get:
      tags:
      - Watchlist
      operationId: getWatchlist
      summary: Get user watchlists & symbols
      responses:
        '200':
          description: Watchlists
          content:
            application/json:
              schema:
                type: object
                properties:
                  lists:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        symbols:
                          type: array
                          items:
                            $ref: '#/components/schemas/Symbol'
              examples:
                example:
                  $ref: '#/components/examples/Watchlist'
    post:
      tags:
      - Watchlist
      operationId: addToWatchlist
      summary: Add symbols (optionally create list)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                symbols:
                  type: array
                  items:
                    $ref: '#/components/schemas/Symbol'
              required:
              - symbols
      responses:
        '201':
          description: Added
  /api/v1/watchlist/{symbol}:
    delete:
      tags:
      - Watchlist
      operationId: removeFromWatchlist
      summary: Remove symbol from default or named list
      parameters:
      - $ref: '#/components/parameters/Symbol'
      - name: list
        in: query
        schema:
          type: string
      responses:
        '204':
          description: Removed
  /api/v1/history:
    get:
      tags:
      - History
      operationId: listHistory
      summary: Historical outcomes (linked to run_id)
      parameters:
      - name: date
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: History
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistoryRow'
              examples:
                example:
                  $ref: '#/components/examples/History'
  /api/v1/settings:
    get:
      tags:
      - Settings
      operationId: getSettings
      summary: Read redacted YAML-backed settings
      responses:
        '200':
          description: Settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'
              examples:
                example:
                  $ref: '#/components/examples/Settings'
    put:
      tags:
      - Settings
      operationId: putSettings
      summary: Update settings (validated)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Settings'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'
  /api/v1/learning:
    get:
      tags:
      - Learning
      operationId: getLearning
      summary: Static learning content
      responses:
        '200':
          description: Content
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/news:
    get:
      tags: [News]
      summary: List news clusters for a symbol within a time window
      operationId: listNewsBySymbol
      parameters:
        - name: symbol
          in: query
          required: true
          schema: { type: string, example: "INDNIPPON.NS" }
        - name: on
          in: query
          description: Trading date (YYYY-MM-DD) in IST; ignored if from/to present
          required: false
          schema: { type: string, format: date }
        - name: align
          in: query
          required: false
          schema:
            type: string
            enum: [trading_day, calendar_day]
            default: trading_day
        - name: from
          in: query
          required: false
          schema: { type: string, format: date-time }
        - name: to
          in: query
          required: false
          schema: { type: string, format: date-time }
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - name: per_page
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 30 }
        - name: min_confidence
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 3 }
        - name: event
          in: query
          required: false
          description: Comma-separated event types (e.g., results,pledge,order_win)
          schema: { type: string }
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [impact_desc, published_desc, confirmed_desc]
            default: impact_desc
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsListResponse"

  /api/v1/moves/{symbol}/reason:
    get:
      tags: [News]
      summary: Likely catalyst(s) explaining a move at a given time
      operationId: reasonForMove
      parameters:
        - name: symbol
          in: path
          required: true
          schema: { type: string }
        - name: at
          in: query
          required: true
          description: ISO timestamp (IST) near the observed move
          schema: { type: string, format: date-time }
        - name: lookback_min
          in: query
          required: false
          schema: { type: integer, minimum: 15, maximum: 1440, default: 240 }
        - name: min_confidence
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 3 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsMoveAttributionResponse"

  /api/v1/news/ingest:
    post:
      tags: [News]
      summary: Batch ingest of normalized news clusters + summaries
      operationId: ingestNews
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsIngestBatch"
      responses:
        "202":
          description: Accepted
  /api/v1/news/list:
    get:
      operationId: listAllNews
      summary: List news across all symbols for a trading window
      description: >
        Returns paginated news clusters grouped by trading window without applying a symbol filter.
        Provide either `on` (with optional `align`) or an explicit `from`/`to` window.
      parameters:
        - in: query
          name: symbol
          required: false
          description: Optional symbol filter (e.g., RELIANCE.NS)
          schema:
            type: string
        - in: query
          name: on
          required: false
          description: Trading date (YYYY-MM-DD) in IST; ignored if explicit from/to provided
          schema:
            type: string
            format: date
        - in: query
          name: align
          required: false
          schema:
            type: string
            enum: [trading_day, calendar_day]
            default: trading_day
        - in: query
          name: from
          required: false
          schema: { type: string, format: date-time }
        - in: query
          name: to
          required: false
          schema: { type: string, format: date-time }
        - in: query
          name: page
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: per_page
          required: false
          schema: { type: integer, minimum: 1, maximum: 500, default: 50 }
        - in: query
          name: min_confidence
          required: false
          schema: { type: integer, minimum: 1, maximum: 5 }
        - in: query
          name: event
          required: false
          description: CSV of event types
          schema:
            type: string
            example: "results,regulatory"
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum: [impact_desc, published_desc, confirmed_desc]
            default: impact_desc
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsWindowListResponse"

                
components:
  parameters:
    Symbol:
      name: symbol
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Symbol'
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 2000
        default: 100
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
    IfNoneMatch:
      name: If-None-Match
      in: header
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
  headers:
    ETag:
      description: Entity tag of response payload
      schema:
        type: string
    RetryAfter:
      description: Seconds to retry after rate limit
      schema:
        type: string
    XRateLimitLimit:
      description: Request limit window
      schema:
        type: integer
    XRateLimitRemaining:
      description: Remaining requests in window
      schema:
        type: integer
    XRateLimitReset:
      description: Unix epoch seconds when the current rate-limit window resets.
      schema:
        type: integer
        minimum: 0
  schemas:
    Symbol:
      type: string
      description: Canonical uppercase ticker
      example: RELIANCE
    RunId:
      type: string
      description: UTC timestamp in YYYYMMDDHHmmss (14 digits)
      pattern: ^[0-9]{14}$
      example: '20250912153000'
    RunSummaryBase:
      type: object
      properties:
        run_id:
          type: string
          pattern: ^[0-9]{14}$
          description: UTC timestamp yyyymmddHHMMss
        job_name:
          type: string
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum:
          - PENDING
          - RUNNING
          - SUCCEEDED
          - FAILED
    RunSummary:
      allOf:
      - $ref: '#/components/schemas/RunSummaryBase'
      - type: object
        properties:
          duration_ms:
            type: integer
            nullable: true
          key:
            type: string
            nullable: true
          snapshot_path:
            type: string
            nullable: true
    Counts:
      type: object
      properties:
        symbols_processed:
          type: integer
          nullable: true
        rows_written:
          type: integer
          nullable: true
    RunDetail:
      allOf:
      - $ref: '#/components/schemas/RunSummary'
      - type: object
        properties:
          counts:
            $ref: '#/components/schemas/Counts'
          error:
            type: string
            nullable: true
          error_json:
            type: object
            additionalProperties: true
            nullable: true
            description: Raw error payload (for troubleshooting)
    Pagination:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
          nullable: true
        next_cursor:
          type: string
          nullable: true
    Problem:
      type: object
      required:
      - type
      - title
      - status
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        code:
          type: string
          description: App-specific error code
          enum:
          - VALIDATION_ERROR
          - RATE_LIMITED
          - SNAPSHOT_CONFLICT
          - NOT_FOUND
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
    HealthState:
      type: object
      properties:
        status:
          type: string
        details:
          type: object
          additionalProperties: true
    UniverseInstrument:
      type: object
      properties:
        symbol:
          $ref: '#/components/schemas/Symbol'
        name:
          type: string
        sector:
          type: string
        active:
          type: boolean
      required:
      - symbol
      - name
    SectorFacet:
      type: object
      properties:
        sector:
          type: string
        count:
          type: integer
    Score:
      type: object
      properties:
        total:
          type: number
        momentum_12_1m:
          type: number
        momentum_6m:
          type: number
        momentum_3m:
          type: number
        momentum_1m:
          type: number
        rsi_component:
          type: number
        adx_component:
          type: number
        volatility_penalty:
          type: number
    ScreenerRow:
      type: object
      required:
      - symbol
      - last
      - change_pct
      - score
      properties:
        symbol:
          type: string
          example: RELIANCE
        name:
          type: string
          example: Reliance Industries
        sector:
          type: string
          example: Energy
        last:
          type: number
          format: float
          example: 2700.5
        change_pct:
          type: number
          format: float
          example: 1.2
        wk_change:
          type: number
          format: float
          nullable: true
          example: 35.8
        wk_change_pct:
          type: number
          format: float
          nullable: true
          example: 1.35
        badges:
          type: array
          items:
            $ref: '#/components/schemas/Badge'
        score:
          type: number
          format: float
          example: 78
        strength:
          type: string
          example: Moderate
        rsi:
          type: number
          format: float
          example: 59.32
        adx:
          type: number
          format: float
          example: 17.91
        ret_12_1m:
          type: number
          format: float
          example: 15.4
        ret_6m:
          type: number
          format: float
          example: 10.8
        ret_3m:
          type: number
          format: float
          example: 6.1
        ret_1m:
          type: number
          format: float
          example: 2.3
        pct_from_52w_high:
          type: number
          format: float
          example: -4.2
        atr_pct:
          type: number
          format: float
          example: 2.1
        liquidity:
          type: number
          format: float
          example: 180000000
        vol_spike:
          type: number
          format: float
          example: 1.4
        pct_today:
          type: number
          format: float
          example: 0.85
        buy:
          type: boolean
          example: false
        reason:
          type: string
          example: ''
        source:
          type: string
          example: scan
        stale:
          type: boolean
          example: false
        run_id:
          type: string
          example: 20250910T153000Z
        as_of:
          type: string
          format: date-time
          example: '2025-09-10T15:30:00Z'
        last_index:
          type: string
          format: date
          example: '2025-09-01'
    ScreenerList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ScreenerRow'
        pagination:
          $ref: '#/components/schemas/Pagination'
        as_of:
          type: string
          format: date-time
          nullable: true
          description: Snapshot timestamp (UTC)
        run_id:
          type: string
          nullable: true
          description: Run identifier used for this list
    TopMovers:
      type: object
      required: [period, generated_at, gainers, losers]
      properties:
        period:
          type: string
          enum: ["1d", "1w", "1m", "3m"]
        generated_at:
          type: string
          format: date-time
        run_id:
          type: string
          nullable: true
        as_of:
          type: string
          format: date
          nullable: true
        gainers:
          type: array
          items:
            $ref: '#/components/schemas/TopMoverEntry'
        losers:
          type: array
          items:
            $ref: '#/components/schemas/TopMoverEntry'
    TopMoverEntry:
      type: object
      required: [symbol, price, change_pct, next_action]
      properties:
        symbol:
          type: string
        name:
          type: string
          nullable: true
        sector:
          type: string
          nullable: true
        price:
          type: number
          format: double
        change_pct:
          type: number
          format: double
        score:
          type: number
          format: double
          nullable: true
        next_action:
          $ref: '#/components/schemas/DrawerNextAction'

    NextAction:
      type: object
      properties:
        code:
          type: string
          example: HOLD_TRAIL
        text:
          type: string
          example: Hold (trail stop at ₹3925.0)
        reasons:
          type: array
          items:
            type: string
          example:
          - Close ≥ EMA10
          - Momentum intact
        refs:
          type: object
          additionalProperties: true
          example:
            stop_now: 3925.0
            ema_n: 10
            ema_value: 3928.7
        action:
          type: string
          description: High-level recommendation verb
          enum:
          - BUY
          - HOLD
          - SELL
          - WATCH
          - ADD
          - TRIM
          - REDUCE
    PriceCandle:
      type: object
      properties:
        dt:
          type: string
          format: date
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: number
    IndicatorPoint:
      type: object
      properties:
        dt:
          type: string
          format: date
        key:
          type: string
          enum:
          - rsi
          - adx
          - ema12
          - ema26
          - ema50
          - ema200
          - obv
          - relvol
        value:
          type: number
    AlertRule:
      type: object
      properties:
        symbol:
          $ref: '#/components/schemas/Symbol'
        enabled:
          type: boolean
        channels:
          type: object
          properties:
            email:
              type: boolean
            desktop:
              type: boolean
            whatsapp:
              type: boolean
        conditions:
          type: object
          additionalProperties: true
      required:
      - symbol
      - enabled
    AlertState:
      type: object
      properties:
        id:
          type: integer
        rule:
          $ref: '#/components/schemas/AlertRule'
        last_fired_at:
          type: string
          format: date-time
          nullable: true
        muted_until:
          type: string
          format: date-time
          nullable: true
    HistoryRow:
      type: object
      properties:
        run_id:
          $ref: '#/components/schemas/RunId'
        symbol:
          $ref: '#/components/schemas/Symbol'
        outcome:
          type: string
        pnl_pct:
          type: number
        notes:
          type: string
    Settings:
      type: object
      description: Redacted YAML-backed settings surfaced to UI
      additionalProperties: true
    PositionIn:
      type: object
      properties:
        symbol:
          $ref: '#/components/schemas/Symbol'
        price:
          type: number
        as_of:
          type: string
          format: date-time
        note:
          type: string
      required:
      - symbol
      - price
      - as_of
    PositionOut:
      type: object
      required: [id, symbol, trade_on, created_at, updated_at]
      properties:
        id: { type: integer }
        symbol: { type: string }
        entry_price_locked:
          type: number
          format: double
          nullable: true         # NULL when unlocked
        qty:
          type: integer
          nullable: true
        stop_now:
          type: number
          format: double
          nullable: true
        exit_close_threshold:
          type: number
          format: double
          nullable: true
        breakeven_active:
          type: boolean
          default: false
        euphoria_on:
          type: boolean
          default: false
        trade_on:
          type: boolean
          default: false
        note:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PositionCreate:              # lock
      type: object
      required: [symbol, price]
      properties:
        symbol: { type: string }
        price:
          type: number
          format: double
          minimum: 0
          exclusiveMinimum: true
        qty:
          type: integer
          nullable: true
        note:
          type: string
          nullable: true
        as_of:
          type: string
          format: date-time
          nullable: true

    PositionUpdate:              # partial fields; NOT allowed to change entry_price_locked
      type: object
      properties:
        qty:
          type: integer
          nullable: true
        stop_now:
          type: number
          format: double
          nullable: true
        exit_close_threshold:
          type: number
          format: double
          nullable: true
        breakeven_active:
          type: boolean
        euphoria_on:
          type: boolean
        trade_on:
          type: boolean
        note:
          type: string
          nullable: true

    PositionUpsert:
      type: object
      description: >
        Partial update used by PUT /api/v1/positions/{symbol}. All fields are optional; only send the fields
        you want to set/update. Server canonicalizes the symbol from the path and returns a PositionOut.
      additionalProperties: false
      properties:
        entry_price_locked:
          type: number
          minimum: 0
          description: Locked entry chosen by user (₹).
        qty:
          type: integer
          minimum: 0
          description: Position size (shares/units).
        trade_on:
          type: boolean
          description: Whether trade/position is active for this symbol.
        stop_now:
          type: number
          minimum: 0
          description: Current trailing/soft stop level (₹).
        exit_close_threshold:
          type: number
          minimum: 0
          description: Close-below threshold to trigger exit (₹).
        breakeven_active:
          type: boolean
          description: Whether breakeven rule is active.
        euphoria_on:
          type: boolean
          description: Whether “euphoria” guardrail is active.
        note:
          type: string
          maxLength: 2000
          description: Free-form note saved with the position.

    SnapshotPinIn:
      type: object
      properties:
        symbol:
          $ref: '#/components/schemas/Symbol'
        run_id:
          $ref: '#/components/schemas/RunId'
      required:
      - symbol
      - run_id
    SnapshotPinOut:
      allOf:
      - $ref: '#/components/schemas/SnapshotPinIn'
      - type: object
        properties:
          id:
            type: integer
          created_at:
            type: string
            format: date-time
    DrawerDetail:
      type: object
      required:
        - drawer_contract_version
        - symbol
        - trading_day
        - header
        - sparkline
        - score_breakdown
        - action_block
        - meters
        - next_action
        - diagnostics
      properties:
        drawer_contract_version:
          type: string
          example: "1.0.0"
          description: Semantic version for the drawer contract.
        scoring_rules_version:
          type: string
          example: "scores_v2"
          description: Version tag emitted by scoring layer.
        symbol:
          type: string
          example: "RELIANCE.NS"
        trading_day:
          type: string
          format: date
          example: "2025-09-19"
          description: Latest completed trading day used for this view.
        intraday_numerator_used:
          type: boolean
          example: false
          description: True if any intraday values were used in composing this card.
        header:
          $ref: '#/components/schemas/DrawerHeader'
        sparkline:
          $ref: '#/components/schemas/DrawerSparkline'
        score_breakdown:
          $ref: '#/components/schemas/DrawerScoreBreakdown'
        position:
          $ref: '#/components/schemas/DrawerPosition'
        action_block:
          $ref: '#/components/schemas/DrawerActionBlock'
        meters:
          $ref: '#/components/schemas/DrawerMeters'
        next_action:
          $ref: '#/components/schemas/DrawerNextAction'
        alerts:
          $ref: '#/components/schemas/DrawerAlerts'
        diagnostics:
          $ref: '#/components/schemas/DrawerDiagnostics'
        news_recent_hours:
          type: integer
          description: Default lookback window (hours) for the right-drawer news tab.
          example: 168

        # -------- Backward-compatibility aliases (deprecated) --------
        run_id:
          type: string
          deprecated: true
        as_of:
          type: string
          format: date-time
          deprecated: true
        name:
          type: string
          deprecated: true
        sector:
          type: string
          deprecated: true
        price:
          type: number
          format: double
          deprecated: true
          description: Use header.price instead.
        pct_today:
          type: number
          format: double
          deprecated: true
          description: Use header.pct_1d instead.
        score:
          type: integer
          minimum: 0
          maximum: 100
          deprecated: true
          description: Use score_breakdown.score_total_0_100.
        indicators:
          type: object
          additionalProperties: true
          deprecated: true
        badges:
          type: array
          items:
            $ref: '#/components/schemas/LegacyBadge'
          deprecated: true
        method_pill:
          type: string
          deprecated: true
        alert_templates:
          type: array
          items:
            type: string
          deprecated: true
        channels:
          nullable: true
          deprecated: true

    DrawerHeader:
      type: object
      required: [name, price, pct_1d, badges]
      properties:
        name:
          type: string
          example: "Tata Consultancy Services"
        sector:
          type: string
          nullable: true
          example: "IT"
        price:
          type: number
          format: double
          example: 4521.5
        pct_1d:
          type: number
          format: double
          example: 2.4
        badges:
          type: array
          items:
            $ref: '#/components/schemas/Badge'

    Badge:
      type: object
      required: [category, label]
      properties:
        category:
          type: string
          enum: [BREAKOUT, MOMENTUM, WATCH, IGNORE,ACTION]
        label:
          type: string
          example: "🚀 Very High Breakout"

    LegacyBadge:
      type: object
      properties:
        code:
          type: string
        text:
          type: string
        key:
          nullable: true
        label:
          nullable: true
        color:
          nullable: true

    DrawerSparkline:
      type: object
      required: [prices_30d]
      properties:
        prices_30d:
          type: array
          items: { type: number, format: double }
          minItems: 1
        ema10_30d:
          type: array
          items: { type: number, format: double }
          description: Optional overlay; same length as prices_30d when present.
        dates_30d:
          type: array
          items:
            type: string
            format: date
          description: ISO trading dates aligned 1:1 with prices_30d.

    DrawerScoreBreakdown:
      type: object
      required: [score_total_0_100, rsi14, adx14, relvol20, trend_rank, breakout_quality]
      properties:
        score_total_0_100:
          type: integer
          minimum: 0
          maximum: 100
          description: Canonical score (Full when available; else normalized Basic).
        score_source:
          type: string
          enum: [full, basic_fallback]
        score_basic:
          type: integer
          minimum: 0
          maximum: 12
          nullable: true
        score_basic_normalized:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
        rsi14:
          type: number
          format: double
        adx14:
          type: number
          format: double
        relvol20:
          type: number
          format: double
        trend_rank:
          type: integer
          minimum: 0
          maximum: 10
        breakout_quality:
          type: integer
          minimum: 0
          maximum: 10
        proximity_52w_high_pct:
          type: number
          format: double
          nullable: true
        pivot_clear_pct:
          type: number
          format: double
          nullable: true
        base_len_bars:
          type: integer
          nullable: true
        data_gaps:
          type: array
          items: { type: string }
          description: Missing inputs when basic_fallback is used.
        stale:
          type: boolean
          description: True when score_source is basic_fallback.

    DrawerPosition:
      type: object
      properties:
        entry_price_locked:
          type: number
          format: double
          nullable: true
        qty:
          type: integer
          nullable: true

    DrawerActionBlock:
      type: object
      required: [breakeven_state, euphoria_state]
      properties:
        stop_now:
          type: number
          format: double
          nullable: true
        stop_method:
          type: string
          enum: [ATRxK, EMA_tight]
          nullable: true
        exit_close_threshold:
          type: number
          format: double
          nullable: true
        breakeven_state:
          type: string
          enum: [Pending, Active]
        euphoria_state:
          type: string
          enum: [Off, On]

    DrawerMeters:
      type: object
      required: [risk, euphoria]
      properties:
        risk:
          $ref: '#/components/schemas/Meter'
        euphoria:
          $ref: '#/components/schemas/Meter'

    Meter:
      type: object
      required: [level, score_0_100, basis, thresholds]
      properties:
        level:
          type: string
          enum: [Low, Medium, High]
        score_0_100:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
          description: Quantitative calibration for the meter; null if not computable.
        basis:
          type: object
          additionalProperties: true
          description: Raw inputs used to compute the meter (e.g., atr14_pct, rsi14, adx14).
        thresholds:
          type: object
          required: [low_lt, medium_gte, high_gte]
          properties:
            low_lt:
              type: integer
              example: 33
            medium_gte:
              type: integer
              example: 33
            high_gte:
              type: integer
              example: 66

    DrawerNextAction:
      type: object
      required: [code, text, refs]
      properties:
        code:
          type: string
          enum:
            - SELL_NOW
            - SELL_TOMORROW
            - HOLD
            - HOLD_BREAKEVEN
            - HOLD_TIGHT
            - BUY_BREAKOUT
            - BUY_PULLBACK
            - BUY_STARTER
            - WATCH
            - IGNORE
        text:
          type: string
          example: "Hold — Trail stop at ₹4382.0"
        reasons:
          type: array
          items: { type: string }
        refs:
          type: object
          additionalProperties: { type: number, format: double }
          description: Numeric references used in the text (e.g., S/E/pivot/entry/A/B).

    DrawerAlerts:
      type: object
      properties:
        suggestions:
          type: array
          items: { type: string }

    DrawerDiagnostics:
      type: object
      required: [reason, rules_version]
      properties:
        reason:
          type: string
          example: "Yes — 86/100. strong momentum, trend strong, pivot cleared, volume strong"
        reason_text:
          type: string
          nullable: true
          description: Optional natural-language explanation; may be same as reason.
        rules_version:
          type: string
          example: "scores_v2"
        blocked_reason:
          type: string
          nullable: true
    ScanRequest:
      type: object
      additionalProperties: false
      properties:
        key:
          type: string
          description: Optional client-generated idempotency key (1–64 chars, [A-Za-z0-9_-])
        as_of:
          type: string
          format: date
          nullable: true
          description: Optional date to backfill / label the snapshot
        universe:
          type: string
          nullable: true
          description: Optional universe preset (e.g., NIFTY500)
        notes:
          type: string
          nullable: true
          description: Free-text note for this run
    NewsEventType:
      type: string
      description: Normalized catalyst/event category for a news item
      enum: [results, order_win, pledge, rating_change, regulatory, court, mna, guidance, mgmt_change, macro, other]

    NewsSentiment:
      type: string
      enum: [positive, negative, mixed, neutral]

    NewsSourceRef:
      type: object
      required: [publisher, url]
      properties:
        publisher:
          type: string
          example: Moneycontrol
        url:
          type: string
          format: uri
        paywalled:
          type: boolean
          default: false

    NewsCard:
      type: object
      required: [cluster_id, symbol, published, title, event_type, bullets, why, confidence_stars, source_count, sources]
      properties:
        cluster_id:
          type: string
          example: clu_x1y2z3
        symbol:
          type: string
          description: Canonical symbol tagged to this news cluster
        published:
          type: string
          format: date-time
          description: Earliest seen publish time (IST)
        title:
          type: string
        event_type:
          $ref: "#/components/schemas/NewsEventType"
        bullets:
          type: array
          minItems: 1
          items: { type: string }
          description: 2–5 factual points; engine decides length
        why:
          type: string
          description: One-line reason why this matters for price/momentum
        sentiment:
          $ref: "#/components/schemas/NewsSentiment"
        confidence_stars:
          type: integer
          minimum: 1
          maximum: 3
        consensus_score:
          type: number
          format: float
          minimum: 0
          maximum: 1
        source_count:
          type: integer
          minimum: 1
        sources:
          type: array
          items: { $ref: "#/components/schemas/NewsSourceRef" }
        impact_score:
          type: number
          format: float
          minimum: 0
          maximum: 1
          nullable: true
          description: Ranking score used when explaining a move
        correlation_note:
          type: string
          nullable: true
          description: e.g., "Appeared 12m before price spike"
        source_primary:
          type: string
          description: Primary publisher for display (first source)
          nullable: true
        source_url:
          type: string
          format: uri
          description: Primary URL for display (first source)
          nullable: true        

