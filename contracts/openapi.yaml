openapi: 3.1.0
info:
  title: Momentum Dashboard API
  version: 0.8.0
  summary: OpenAPI-first contracts for React + FastAPI app (Parquet+SQLite).
  description: Contract-first spec. Clients must be generated from this file. All
    endpoints are local-only and authenticated as N/A for now.
servers:
- url: http://localhost:8000/api/v1
tags:
- name: Health
- name: Screener
- name: Runs
- name: Universe
- name: Instruments
- name: Positions
- name: Snapshots
- name: Momentum
- name: Alerts
- name: Watchlist
- name: History
- name: Settings
- name: Learning
- name: News
paths:
  /api/v1/health:
    get:
      tags:
      - Health
      operationId: health
      summary: Quick health (combined)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthState'
              examples:
                example:
                  $ref: '#/components/examples/Health'
  /api/v1/health/live:
    get:
      tags:
      - Health
      operationId: healthLive
      summary: Liveness probe
      responses:
        '200':
          description: Live
  /api/v1/health/ready:
    get:
      tags:
      - Health
      operationId: healthReady
      summary: Readiness probe (SQLite + Parquet availability)
      responses:
        '200':
          description: Ready
        '503':
          description: Not ready
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                example:
                  $ref: '#/components/examples/Problem503'
  /api/v1/health/metrics:
    get:
      tags:
      - Health
      operationId: metrics
      summary: Prometheus metrics (optional)
      responses:
        '200':
          description: Prometheus exposition
          content:
            text/plain:
              schema:
                type: string
  /api/v1/screener:
    get:
      tags:
      - Screener
      summary: List screener rows (filtered, sorted, paginated)
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: per_page
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 100
      - name: sort_by
        in: query
        schema:
          type: string
          enum:
          - score
          - pct_today
          - rsi
          - adx
          - proximity_52w_high
          - relvol20
          - price
          - name
          - sector
          - wk_change
          - wk_change_pct
          default: score
      - name: sort_dir
        in: query
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
      - name: universe
        in: query
        schema:
          type: string
          enum:
          - NIFTY50
          - NIFTY100
          - NIFTY500
          - MIDCAP
          - SMALLCAP
          - ALL
      - name: symbol
        in: query
        schema:
          type: string
        description: Exact ticker symbol (case-insensitive)
      - name: sector_in
        in: query
        schema:
          type: array
          items:
            type: string
        style: form
        explode: true
      - name: score_min
        in: query
        schema:
          type: number
      - name: rsi_min
        in: query
        schema:
          type: number
      - name: rsi_max
        in: query
        schema:
          type: number
      - name: adx_min
        in: query
        schema:
          type: number
      - name: price_min
        in: query
        schema:
          type: number
      - name: price_max
        in: query
        schema:
          type: number
      - name: pct_today_min
        in: query
        schema:
          type: number
      - name: proximity_52w_high_max
        in: query
        schema:
          type: number
          description: Within X% of 52W high if <= X
      - name: watchlist_only
        in: query
        schema:
          type: boolean
          default: false
      - name: stale_exclude
        in: query
        schema:
          type: boolean
          default: true
      - name: run_id
        in: query
        schema:
          type: string
          description: If omitted, server uses latest snapshot
      responses:
        '200':
          description: Screener result page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScreenerList'

  /api/v1/screener/top-movers:
    get:
      tags:
      - Screener
      summary: Top gainers and losers for the requested period
      operationId: getTopMovers
      parameters:
      - name: period
        in: query
        description: Period over which to compute percentage change
        schema:
          type: string
          enum: ["1d", "1w", "1m", "3m", "6m", "1y", "5y", "custom"]
          default: "1d"
      - name: start_date
        in: query
        description: Custom period start date; only valid when period is custom
        schema:
          type: string
          format: date
          nullable: true
      - name: end_date
        in: query
        description: Custom period end date; only valid when period is custom
        schema:
          type: string
          format: date
          nullable: true
      responses:
        '200':
          description: Top movers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopMovers'
  /api/v1/screener/run-dates:
    get:
      tags:
      - Screener
      summary: List available screener snapshot dates
      operationId: getScreenerRunDates
      description: >
        Returns recent calendar dates that have committed screener snapshots.
        Use `mode=intraday` to retrieve trading days with intraday runs, or `mode=eod`
        for end-of-day snapshots.
      parameters:
      - name: mode
        in: query
        schema:
          $ref: '#/components/schemas/ScreenerRunMode'
          default: intraday
        required: false
        description: Snapshot category to inspect. Defaults to `intraday`.
      - name: limit
        in: query
        schema:
          type: integer
          format: int32
          minimum: 1
          maximum: 120
          default: 30
        required: false
        description: Maximum number of dates to return (most recent first).
      responses:
        '200':
          description: Available snapshot dates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScreenerRunDateList'
              examples:
                intraday:
                  value:
                    mode: intraday
                    latest:
                      mode: intraday
                      trade_date: '2025-10-25'
                      run_count: 4
                      label: 'Sat 25 Oct'
                    dates:
                    - mode: intraday
                      trade_date: '2025-10-25'
                      run_count: 4
                      label: 'Sat 25 Oct'
                    - mode: intraday
                      trade_date: '2025-10-24'
                      run_count: 6
                      label: 'Fri 24 Oct'
                eod:
                  value:
                    mode: eod
                    latest:
                      mode: eod
                      as_of: '2025-10-24'
                      run_count: 1
                      label: 'Fri 24 Oct'
                    dates:
                    - mode: eod
                      as_of: '2025-10-24'
                      run_count: 1
                      label: 'Fri 24 Oct'
                    - mode: eod
                      as_of: '2025-10-23'
                      run_count: 1
                      label: 'Thu 23 Oct'
  /api/v1/screener/runs:
    get:
      tags:
      - Screener
      summary: List screener runs for a specific date
      operationId: getScreenerRuns
      description: >
        Enumerates screener runs for the requested snapshot category and trading date.
        When `mode=intraday`, `trade_date` is required and the endpoint returns multiple
        run identifiers ordered newest first. When `mode=eod`, `as_of` is required and
        exactly one run (per day) is returned.
      parameters:
      - name: mode
        in: query
        schema:
          $ref: '#/components/schemas/ScreenerRunMode'
          default: intraday
        required: false
        description: Snapshot category to inspect.
      - name: trade_date
        in: query
        schema:
          type: string
          format: date
        required: false
        description: Trading date (YYYY-MM-DD). Required when `mode=intraday`.
      - name: as_of
        in: query
        schema:
          type: string
          format: date
        required: false
        description: End-of-day snapshot date (YYYY-MM-DD). Required when `mode=eod`.
      - name: limit
        in: query
        schema:
          type: integer
          format: int32
          minimum: 1
          maximum: 200
          default: 25
        required: false
        description: Maximum number of runs to return (intraday only).
      responses:
        '200':
          description: Runs for the requested bucket
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScreenerRunList'
              examples:
                intraday:
                  value:
                    mode: intraday
                    trade_date: '2025-10-25'
                    latest:
                      mode: intraday
                      run_id: '20251025121500'
                      trade_date: '2025-10-25'
                      started_at: '2025-10-25T12:15:08Z'
                      completed_at: '2025-10-25T12:15:28Z'
                      label: '12:15 PM IST'
                    items:
                    - mode: intraday
                      run_id: '20251025121500'
                      trade_date: '2025-10-25'
                      started_at: '2025-10-25T12:15:08Z'
                      completed_at: '2025-10-25T12:15:28Z'
                      label: '12:15 PM IST'
                    - mode: intraday
                      run_id: '20251025120000'
                      trade_date: '2025-10-25'
                      started_at: '2025-10-25T12:00:05Z'
                      completed_at: '2025-10-25T12:00:24Z'
                      label: '12:00 PM IST'
                eod:
                  value:
                    mode: eod
                    as_of: '2025-10-24'
                    latest:
                      mode: eod
                      run_id: '20251024045523'
                      as_of: '2025-10-24'
                      label: 'Fri 24 Oct EOD'
                    items:
                    - mode: eod
                      run_id: '20251024045523'
                      as_of: '2025-10-24'
                      started_at: '2025-10-24T04:55:00Z'
                      completed_at: '2025-10-24T04:55:22Z'
                      label: 'Fri 24 Oct EOD'
  /api/v1/screener/export:
    get:
      tags:
      - Screener
      summary: Export a screener snapshot
      operationId: exportScreenerSnapshot
      description: >
        Streams the full screener snapshot for the requested run. Provide either
        `run_id` (intraday runs) or `as_of` (end-of-day snapshots). When both are
        supplied, `run_id` takes precedence.
      parameters:
      - name: run_id
        in: query
        schema:
          $ref: '#/components/schemas/RunId'
        required: false
        description: Intraday run identifier (YYYYMMDDHHmmss).
      - name: as_of
        in: query
        schema:
          type: string
          format: date
        required: false
        description: End-of-day snapshot date (YYYY-MM-DD).
      - name: format
        in: query
        schema:
          type: string
          enum:
          - csv
          - json
          default: csv
        required: false
        description: Output format. Defaults to CSV.
      responses:
        '200':
          description: Snapshot export
          content:
            text/csv:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScreenerRow'
        '400':
          description: Missing run identifier (`run_id` or `as_of` required)
        '404':
          description: Snapshot not found for the requested selection


  /api/v1/candidate-pool:
    get:
      tags:
      - Screener
      summary: List active buy candidates (pool)
      operationId: getCandidatePool
      description: >
        Returns the ranked candidate pool (max 10) built from strict EOD buy signals and maintained
        with relaxed exit rules. Ranking is based on score, R-multiple, ADX, and proximity to 52W high.
      responses:
        '200':
          description: Active candidate pool
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidatePoolList'

  /api/v1/scan:
    post:
      tags:
      - Screener
      operationId: postScan
      summary: Start a manual screening run (idempotent)
      description: 'Triggers a new scores snapshot with a fresh run_id. If the same

        Idempotency-Key (or ScanRequest.key) is reused, returns the existing run.

        On first creation: 201 Created. On idempotent replay: 200 OK.

        '
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScanRequest'
      responses:
        '201':
          description: New run created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunDetail'
              example:
                example:
                  value:
                    run_id: '20250101153000'
                    job_name: manual_scan
                    started_at: '2025-01-01T15:30:00Z'
                    status: RUNNING
        '200':
          description: Idempotent replay (existing run returned)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunDetail'
        '422':
          description: Invalid Idempotency-Key or request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '429':
          description: Rate limited
          headers:
            Retry-After:
              $ref: '#/components/headers/RetryAfter'
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
  /api/v1/runs:
    get:
      tags:
      - Runs
      operationId: listRuns
      summary: List recent scan runs
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      - name: status
        in: query
        required: false
        schema:
          type: string
          enum:
          - PENDING
          - RUNNING
          - SUCCEEDED
          - FAILED
        description: Optional status filter
      responses:
        '200':
          description: Runs
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/RunSummary'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
              examples:
                example:
                  $ref: '#/components/examples/Runs'
  /api/v1/runs/{run_id}:
    get:
      tags:
      - Runs
      operationId: getRun
      summary: Run details
      parameters:
      - name: run_id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/RunId'
      responses:
        '200':
          description: Run detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunDetail'
              example:
                example:
                  value:
                    run_id: '20250101153000'
                    job_name: scan_every_15m
                    started_at: '2025-01-01T15:30:00Z'
                    ended_at: '2025-01-01T15:30:12Z'
                    status: SUCCEEDED
                    counts:
                      symbols_processed: 500
                      rows_written: 500
        '404':
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /api/v1/universe:
    get:
      tags:
      - Universe
      operationId: listUniverse
      summary: List/search universe (symbols)
      parameters:
      - $ref: '#/components/parameters/IfNoneMatch'
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      - name: q
        in: query
        schema:
          type: string
      - name: sector
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Universe list
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/UniverseInstrument'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
              examples:
                example:
                  $ref: '#/components/examples/UniverseList'
        '304':
          description: Not Modified
  /api/v1/universe/sectors:
    get:
      tags:
      - Universe
      operationId: listSectors
      summary: Sector facets with counts
      responses:
        '200':
          description: Sectors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SectorFacet'
              examples:
                example:
                  $ref: '#/components/examples/Sectors'
  /api/v1/instruments:
    get:
      tags:
      - Instruments
      operationId: listInstruments
      summary: Search/autocomplete instruments
      parameters:
      - name: q
        in: query
        schema:
          type: string
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Instruments
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/UniverseInstrument'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
  /api/v1/instruments/{symbol}/prices:
    get:
      tags:
      - Instruments
      operationId: getInstrumentPrices
      summary: Price slice for sparkline
      parameters:
      - $ref: '#/components/parameters/Symbol'
      - name: range
        in: query
        description: e.g., 30d, 90d, 1y
        schema:
          type: string
      responses:
        '200':
          description: OHLCV candles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PriceCandle'
  /api/v1/instruments/{symbol}/indicators:
    get:
      tags:
      - Instruments
      operationId: getInstrumentIndicators
      summary: Indicator slice for chart tabs
      parameters:
      - $ref: '#/components/parameters/Symbol'
      - name: range
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Indicator points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IndicatorPoint'
  /api/v1/positions:
    get:
      tags: [positions]
      summary: List positions (optionally filter by symbol/status)
      parameters:
        - in: query
          name: symbol
          required: false
          schema: { type: string }
        - in: query
          name: active
          required: false
          schema: { type: boolean }
          description: Filter by active (true) or inactive/closed (false) trades
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/PositionOut' }

    post:
      tags: [positions]
      summary: Lock a position (create-or-lock)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PositionCreate' }
      responses:
        "200":
          description: Locked
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PositionOut' }
        "400": { description: Invalid price or payload }

  /api/v1/positions/{symbol}:
    get:
      tags: [positions]
      summary: Get a position by symbol
      parameters:
        - in: path
          name: symbol
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PositionOut' }
        "404": { description: Not found }

  /api/v1/positions/{id}:
    put:
      tags: [positions]
      summary: Update mutable fields of a position (including close)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PositionUpdate' }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PositionOut' }
        "404": { description: Not found }

    delete:
      tags: [positions]
      summary: Soft-close a position (legacy delete)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Unlocked }
        "404": { description: Not found }


  /api/v1/snapshots/pin:
    post:
      tags:
      - Snapshots
      operationId: pinSnapshot
      summary: Pin a snapshot for a symbol
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SnapshotPinIn'
      responses:
        '201':
          description: Pinned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotPinOut'
  /api/v1/snapshots/pins:
    get:
      tags:
      - Snapshots
      operationId: listSnapshotPins
      summary: List pins (optionally by symbol)
      parameters:
      - name: symbol
        in: query
        schema:
          $ref: '#/components/schemas/Symbol'
      responses:
        '200':
          description: Pins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SnapshotPinOut'
              examples:
                example:
                  $ref: '#/components/examples/Pins'
  /api/v1/snapshots/pin/{id}:
    delete:
      tags:
      - Snapshots
      operationId: unpinSnapshot
      summary: Remove a pin
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '204':
          description: Unpinned
  /api/v1/alert-events:
    get:
      tags:
      - Alerts
      operationId: listAlertEvents
      summary: List alert events
      parameters:
      - name: symbol
        in: query
        schema:
          type: string
      - name: trading_date
        in: query
        schema:
          type: string
          format: date
      - name: trading_date_from
        in: query
        schema:
          type: string
          format: date
      - name: trading_date_to
        in: query
        schema:
          type: string
          format: date
      - name: severity
        in: query
        schema:
          type: string
          enum:
          - INFO
          - WARN
          - CRITICAL
      - name: digest_bucket
        in: query
        schema:
          type: string
          enum:
          - BUY
          - SELL
          - MGMT
          - SCORE
      - name: mode
        in: query
        schema:
          type: string
          enum:
          - EOD
          - INTRADAY
      - name: rule_code
        in: query
        schema:
          type: string
      - name: next_action_code
        in: query
        schema:
          type: string
      - name: channel_status
        in: query
        schema:
          type: string
          enum:
          - SENT
          - FAILED
          - SKIPPED
      - name: profile
        in: query
        schema:
          type: string
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 500
      - name: cursor
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Alert events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AlertEvent'
  /api/v1/instruments/{symbol}/detail:
    get:
      tags:
      - Instruments
      summary: Get instrument drawer detail (backend-only)
      parameters:
      - name: symbol
        in: path
        required: true
        schema:
          type: string
        description: Canonical symbol, e.g. TCS.NS
      - name: run_id
        in: query
        required: false
        schema:
          type: string
        description: Use a specific snapshot; defaults to pinned or latest
      responses:
        '200':
          description: Drawer detail payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DrawerDetail'
              examples:
                default:
                  $ref: '#/components/examples/DrawerDetailExample'
  /api/v1/watchlist:
    get:
      tags:
      - Watchlist
      operationId: getWatchlist
      summary: Get user watchlists & symbols
      responses:
        '200':
          description: Watchlists
          content:
            application/json:
              schema:
                type: object
                properties:
                  lists:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        symbols:
                          type: array
                          items:
                            $ref: '#/components/schemas/Symbol'
              examples:
                example:
                  $ref: '#/components/examples/Watchlist'
    post:
      tags:
      - Watchlist
      operationId: addToWatchlist
      summary: Add symbols (optionally create list)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                symbols:
                  type: array
                  items:
                    $ref: '#/components/schemas/Symbol'
              required:
              - symbols
      responses:
        '201':
          description: Added
  /api/v1/watchlist/{symbol}:
    delete:
      tags:
      - Watchlist
      operationId: removeFromWatchlist
      summary: Remove symbol from default or named list
      parameters:
      - $ref: '#/components/parameters/Symbol'
      - name: list
        in: query
        schema:
          type: string
      responses:
        '204':
          description: Removed
  /api/v1/history:
    get:
      tags:
      - History
      operationId: listHistory
      summary: Historical outcomes (linked to run_id)
      parameters:
      - name: date
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: History
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistoryRow'
              examples:
                example:
                  $ref: '#/components/examples/History'
  /api/v1/settings:
    get:
      tags:
      - Settings
      operationId: getSettings
      summary: Read redacted YAML-backed settings
      responses:
        '200':
          description: Settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'
              examples:
                example:
                  $ref: '#/components/examples/Settings'
    put:
      tags:
      - Settings
      operationId: putSettings
      summary: Update settings (validated)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Settings'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'
  /api/v1/learning:
    get:
      tags:
      - Learning
      operationId: getLearning
      summary: Static learning content
      responses:
        '200':
          description: Content
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/news:
    get:
      tags: [News]
      summary: List news clusters for a symbol within a time window
      operationId: listNewsBySymbol
      parameters:
        - name: symbol
          in: query
          required: true
          schema: { type: string, example: "INDNIPPON.NS" }
        - name: on
          in: query
          description: Trading date (YYYY-MM-DD) in IST; ignored if from/to present
          required: false
          schema: { type: string, format: date }
        - name: align
          in: query
          required: false
          schema:
            type: string
            enum: [trading_day, calendar_day]
            default: trading_day
        - name: from
          in: query
          required: false
          schema: { type: string, format: date-time }
        - name: to
          in: query
          required: false
          schema: { type: string, format: date-time }
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - name: per_page
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 30 }
        - name: min_confidence
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 3 }
        - name: event
          in: query
          required: false
          description: Comma-separated event types (e.g., results,pledge,order_win)
          schema: { type: string }
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [impact_desc, published_desc, confirmed_desc]
            default: impact_desc
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsListResponse"

  /api/v1/moves/{symbol}/reason:
    get:
      tags: [News]
      summary: Likely catalyst(s) explaining a move at a given time
      operationId: reasonForMove
      parameters:
        - name: symbol
          in: path
          required: true
          schema: { type: string }
        - name: at
          in: query
          required: true
          description: ISO timestamp (IST) near the observed move
          schema: { type: string, format: date-time }
        - name: lookback_min
          in: query
          required: false
          schema: { type: integer, minimum: 15, maximum: 1440, default: 240 }
        - name: min_confidence
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 3 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsMoveAttributionResponse"

  /api/v1/news/ingest:
    post:
      tags: [News]
      summary: Batch ingest of normalized news clusters + summaries
      operationId: ingestNews
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsIngestBatch"
      responses:
        "202":
          description: Accepted
  /api/v1/news/list:
    get:
      operationId: listAllNews
      summary: List news across all symbols for a trading window
      description: >
        Returns paginated news clusters grouped by trading window without applying a symbol filter.
        Provide either `on` (with optional `align`) or an explicit `from`/`to` window.
      parameters:
        - in: query
          name: symbol
          required: false
          description: Optional symbol filter (e.g., RELIANCE.NS)
          schema:
            type: string
        - in: query
          name: on
          required: false
          description: Trading date (YYYY-MM-DD) in IST; ignored if explicit from/to provided
          schema:
            type: string
            format: date
        - in: query
          name: align
          required: false
          schema:
            type: string
            enum: [trading_day, calendar_day]
            default: trading_day
        - in: query
          name: from
          required: false
          schema: { type: string, format: date-time }
        - in: query
          name: to
          required: false
          schema: { type: string, format: date-time }
        - in: query
          name: page
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: per_page
          required: false
          schema: { type: integer, minimum: 1, maximum: 500, default: 50 }
        - in: query
          name: min_confidence
          required: false
          schema: { type: integer, minimum: 1, maximum: 5 }
        - in: query
          name: event
          required: false
          description: CSV of event types
          schema:
            type: string
            example: "results,regulatory"
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum: [impact_desc, published_desc, confirmed_desc]
            default: impact_desc
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsWindowListResponse"

  /api/v1/momentum/heatmap:
    get:
      tags:
      - Momentum
      summary: NSE sector and industry momentum heatmap snapshot
      operationId: getMomentumHeatmap
      parameters:
      - $ref: '#/components/parameters/IfNoneMatch'
      - in: query
        name: as_of
        required: false
        description: >
          Optional trading date (YYYY-MM-DD, IST) to retrieve a historical snapshot; defaults to the latest available run.
        schema:
          type: string
          format: date
      - in: query
        name: include_industries
        required: false
        schema:
          type: boolean
          default: false
        description: Include industry-level breakdown nested within each sector.
      - in: query
        name: include_constituents
        required: false
        schema:
          type: boolean
          default: false
        description: Include top/bottom constituent momentum summaries for each node.
      responses:
        '200':
          description: Momentum heatmap snapshot
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MomentumHeatmapResponse'
              examples:
                example:
                  value:
                    as_of: '2025-10-12T10:45:00+05:30'
                    trade_date: '2025-10-10'
                    session: cash
                    run_id: '20251012104500'
                    source: nse
                    latency_sec: 120
                    sectors:
                    - name: NIFTY IT
                      symbol: NIFTYIT
                      change_1d: 1.85
                      change_1w: 3.12
                      change_1m: 7.9
                      momentum_score: 0.82
                      turnover_ratio: 1.4
                      total_turnover_cr: 3250.7
                      last_updated: '2025-10-12T10:43:00+05:30'
                      advance_decline:
                        advancers: 18
                        decliners: 4
                        unchanged: 0
                      industries:
                      - name: IT Services
                        symbol: NSEITSE
                        change_1d: 1.9
                        change_1w: 3.5
                        change_1m: 8.4
                        momentum_score: 0.85
                        turnover_ratio: 1.5
                        last_updated: '2025-10-12T10:43:00+05:30'
                        leaders:
                        - symbol: TCS
                          name: Tata Consultancy Services
                          last_price: 3725.5
                          change_1d: 2.1
                          change_1w: 4.3
                          change_1m: 9.6
                          momentum_score: 0.88
                          turnover_ratio: 1.8
                          weight_pct: 24.3
                      leaders:
                      - symbol: INFY
                        name: Infosys
                        last_price: 1498.4
                        change_1d: 2.0
                        change_1w: 3.1
                        change_1m: 8.0
                        momentum_score: 0.79
                        turnover_ratio: 1.6
                        weight_pct: 18.7
                      laggards:
                      - symbol: LTI
                        name: LTIMindtree
                        last_price: 5550.1
                        change_1d: -0.6
                        change_1w: 0.2
                        change_1m: 3.4
                        momentum_score: 0.41
                        turnover_ratio: 0.9
                        weight_pct: 6.2
                    notes:
                    - Sector momentum computed from NSE index series (price return %).
                    - Turnover ratio compares current traded value vs 20-day average.
        '304':
          description: Not Modified

                
components:
  parameters:
    Symbol:
      name: symbol
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Symbol'
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 2000
        default: 100
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
    IfNoneMatch:
      name: If-None-Match
      in: header
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
  headers:
    ETag:
      description: Entity tag of response payload
      schema:
        type: string
    RetryAfter:
      description: Seconds to retry after rate limit
      schema:
        type: string
    XRateLimitLimit:
      description: Request limit window
      schema:
        type: integer
    XRateLimitRemaining:
      description: Remaining requests in window
      schema:
        type: integer
    XRateLimitReset:
      description: Unix epoch seconds when the current rate-limit window resets.
      schema:
        type: integer
        minimum: 0
  schemas:
    Symbol:
      type: string
      description: Canonical uppercase ticker
      example: RELIANCE
    RunId:
      type: string
      description: UTC timestamp in YYYYMMDDHHmmss (14 digits)
      pattern: ^[0-9]{14}$
      example: '20250912153000'
    RunSummaryBase:
      type: object
      properties:
        run_id:
          type: string
          pattern: ^[0-9]{14}$
          description: UTC timestamp yyyymmddHHMMss
        job_name:
          type: string
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum:
          - PENDING
          - RUNNING
          - SUCCEEDED
          - FAILED
    RunSummary:
      allOf:
      - $ref: '#/components/schemas/RunSummaryBase'
      - type: object
        properties:
          duration_ms:
            type: integer
            nullable: true
          key:
            type: string
            nullable: true
          snapshot_path:
            type: string
            nullable: true
    Counts:
      type: object
      properties:
        symbols_processed:
          type: integer
          nullable: true
        rows_written:
          type: integer
          nullable: true
    RunDetail:
      allOf:
      - $ref: '#/components/schemas/RunSummary'
      - type: object
        properties:
          counts:
            $ref: '#/components/schemas/Counts'
          error:
            type: string
            nullable: true
          error_json:
            type: object
            additionalProperties: true
            nullable: true
            description: Raw error payload (for troubleshooting)
    Pagination:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
          nullable: true
        next_cursor:
          type: string
          nullable: true
    Problem:
      type: object
      required:
      - type
      - title
      - status
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        code:
          type: string
          description: App-specific error code
          enum:
          - VALIDATION_ERROR
          - RATE_LIMITED
          - SNAPSHOT_CONFLICT
          - NOT_FOUND
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
    HealthState:
      type: object
      properties:
        status:
          type: string
        details:
          type: object
          additionalProperties: true
    UniverseInstrument:
      type: object
      properties:
        symbol:
          $ref: '#/components/schemas/Symbol'
        name:
          type: string
        sector:
          type: string
        active:
          type: boolean
      required:
      - symbol
      - name
    SectorFacet:
      type: object
      properties:
        sector:
          type: string
        count:
          type: integer

    AdvanceDeclineSummary:
      type: object
      description: Advancer/decliner counts within a basket.
      required: [advancers, decliners]
      properties:
        advancers:
          type: integer
          minimum: 0
        decliners:
          type: integer
          minimum: 0
        unchanged:
          type: integer
          minimum: 0
          nullable: true

    MomentumHeatmapNodeBase:
      type: object
      description: Shared momentum metrics for sectors and industries.
      required:
      - name
      - symbol
      - change_1d
      - change_1w
      - change_1m
      - turnover_ratio
      - last_updated
      properties:
        name:
          type: string
          example: NIFTY IT
        symbol:
          type: string
          example: NIFTYIT
        change_1d:
          type: number
          format: float
          description: Percentage change versus the previous close.
        change_1w:
          type: number
          format: float
          description: Percentage change over the trailing 5 trading days.
        change_1m:
          type: number
          format: float
          description: Percentage change over the trailing 21 trading days.
        momentum_score:
          type: number
          format: float
          minimum: -1
          maximum: 1
          nullable: true
          description: Normalized composite score combining price & breadth factors.
        turnover_ratio:
          type: number
          format: float
          minimum: 0
          description: Current traded value divided by the 20-session average.
        turnover_label:
          type: string
          nullable: true
          description: Preformatted turnover string (e.g., "1.4x").
        last_updated:
          type: string
          format: date-time
          description: IST timestamp when the last datapoint was observed.
        note:
          type: string
          nullable: true

    MomentumHeatmapConstituent:
      type: object
      required: [symbol, name, last_price, change_1d]
      properties:
        symbol:
          type: string
          example: INFY
        name:
          type: string
          example: Infosys
        last_price:
          type: number
          format: float
          description: Last traded price in INR.
        change_1d:
          type: number
          format: float
        change_1w:
          type: number
          format: float
          nullable: true
        change_1m:
          type: number
          format: float
          nullable: true
        momentum_score:
          type: number
          format: float
          nullable: true
        turnover_ratio:
          type: number
          format: float
          minimum: 0
          nullable: true
        avg_turnover_cr:
          type: number
          format: float
          nullable: true
          description: Average traded value (20-day) in INR crore.
        weight_pct:
          type: number
          format: float
          nullable: true
          description: Weight of this constituent inside its parent basket.

    MomentumHeatmapIndustry:
      allOf:
      - $ref: '#/components/schemas/MomentumHeatmapNodeBase'
      - type: object
        properties:
          level:
            type: string
            enum: [industry]
          parent_symbol:
            type: string
            description: NSE sector symbol this industry rolls into.
          total_turnover_cr:
            type: number
            format: float
            nullable: true
          leaders:
            type: array
            items:
              $ref: '#/components/schemas/MomentumHeatmapConstituent'
          laggards:
            type: array
            items:
              $ref: '#/components/schemas/MomentumHeatmapConstituent'

    MomentumHeatmapSector:
      allOf:
      - $ref: '#/components/schemas/MomentumHeatmapNodeBase'
      - type: object
        properties:
          level:
            type: string
            enum: [sector]
          total_turnover_cr:
            type: number
            format: float
            nullable: true
            description: NSE traded value for the index (INR crore).
          advance_decline:
            $ref: '#/components/schemas/AdvanceDeclineSummary'
          industries:
            type: array
            items:
              $ref: '#/components/schemas/MomentumHeatmapIndustry'
          leaders:
            type: array
            items:
              $ref: '#/components/schemas/MomentumHeatmapConstituent'
          laggards:
            type: array
            items:
              $ref: '#/components/schemas/MomentumHeatmapConstituent'

    MomentumHeatmapResponse:
      type: object
      required: [as_of, trade_date, session, sectors]
      properties:
        as_of:
          type: string
          format: date-time
          description: IST timestamp when this snapshot was computed.
        trade_date:
          type: string
          format: date
          description: Trading date aligned to NSE calendar.
        session:
          type: string
          enum: [pre, cash, post, closed]
          description: NSE market session corresponding to the data.
        run_id:
          $ref: '#/components/schemas/RunId'
        source:
          type: string
          example: nse
        latency_sec:
          type: integer
          minimum: 0
          description: Age in seconds of the newest upstream datapoint.
        sectors:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/MomentumHeatmapSector'
        notes:
          type: array
          items:
            type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          nullable: true

    Score:
      type: object
      properties:
        total:
          type: number
        momentum_12_1m:
          type: number
        momentum_6m:
          type: number
        momentum_3m:
          type: number
        momentum_1m:
          type: number
        rsi_component:
          type: number
        adx_component:
          type: number
        volatility_penalty:
          type: number
    ScreenerRow:
      type: object
      required:
      - symbol
      - last
      - change_pct
      - score
      properties:
        symbol:
          type: string
          example: RELIANCE
        name:
          type: string
          example: Reliance Industries
        sector:
          type: string
          example: Energy
        last:
          type: number
          format: float
          example: 2700.5
        change_pct:
          type: number
          format: float
          example: 1.2
        wk_change:
          type: number
          format: float
          nullable: true
          example: 35.8
        wk_change_pct:
          type: number
          format: float
          nullable: true
          example: 1.35
        badges:
          type: array
          items:
            $ref: '#/components/schemas/Badge'
        score:
          type: number
          format: float
          example: 78
        strength:
          type: string
          example: Moderate
        rsi:
          type: number
          format: float
          example: 59.32
        adx:
          type: number
          format: float
          example: 17.91
        ret_12_1m:
          type: number
          format: float
          example: 15.4
        ret_6m:
          type: number
          format: float
          example: 10.8
        ret_3m:
          type: number
          format: float
          example: 6.1
        ret_1m:
          type: number
          format: float
          example: 2.3
        pct_from_52w_high:
          type: number
          format: float
          example: -4.2
        atr_pct:
          type: number
          format: float
          example: 2.1
        liquidity:
          type: number
          format: float
          example: 180000000
        vol_spike:
          type: number
          format: float
          example: 1.4
        pct_today:
          type: number
          format: float
          example: 0.85
        buy:
          type: boolean
          example: false
        buy_flag:
          type: boolean
          description: True when all enforced buy gates passed.
        buy_profile:
          type: string
          nullable: true
          description: Active buy profile key (e.g., swing_eod, intraday_breakout).
        buy_mode:
          type: string
          nullable: true
          description: Evaluation mode used for the buy gates.
          enum: [EOD, INTRADAY]
        buy_pass_count:
          type: integer
          nullable: true
          description: Number of enforced buy gates that passed.
        buy_total_count:
          type: integer
          nullable: true
          description: Total enforced buy gates evaluated.
        buy_checks:
          type: array
          description: Checklist rows for enforced buy gates.
          items:
            $ref: '#/components/schemas/BuyCheck'
        buy_failed_codes:
          type: array
          nullable: true
          description: Codes of enforced buy gates that failed.
          items:
            type: string
        buy_reasons_inline:
          type: string
          nullable: true
          description: Inline summary of buy reasons.
        buy_eval_ts:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the buy evaluation occurred.
        buy_enforced_checks:
          type: array
          nullable: true
          description: Enforced gate codes considered during evaluation.
          items:
            type: string
        buy_reason_parts:
          type: array
          nullable: true
          description: Structured fragments of the buy reasons summary.
          items:
            type: string
        buy_selected:
          type: boolean
          nullable: true
          description: True when the row represents the selected candidate for the day.
        buy_selection_reason:
          type: string
          nullable: true
          description: Short explanation of why this symbol was selected.
        buy_stop_price:
          type: number
          format: float
          nullable: true
          description: Trailing stop price applied at selection time.
        buy_target_price:
          type: number
          format: float
          nullable: true
          description: Initial target price used for selection ranking.
        buy_r_multiple:
          type: number
          format: float
          nullable: true
          description: R multiple computed for selection ranking.
        buy_selection_run_id:
          type: string
          nullable: true
          description: Run identifier that produced the selection.
        buy_selection_trading_day:
          type: string
          nullable: true
          description: Trading date associated with the selection result.
        reason:
          type: string
          example: ''
        source:
          type: string
          example: scan
        stale:
          type: boolean
          example: false
        run_id:
          type: string
          example: 20250910T153000Z
        as_of:
          type: string
          format: date-time
          example: '2025-09-10T15:30:00Z'
        last_index:
          type: string
          format: date
          example: '2025-09-01'
    ScreenerList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ScreenerRow'
        pagination:
          $ref: '#/components/schemas/Pagination'
        as_of:
          type: string
          format: date-time
          nullable: true
          description: Snapshot timestamp (UTC)
        run_id:
          type: string
          nullable: true
          description: Run identifier used for this list
    ScreenerRunMode:
      type: string
      enum:
      - intraday
      - eod
      description: Snapshot category. Intraday captures within-session runs; EOD maps to end-of-day snapshots.
    ScreenerRunDate:
      type: object
      properties:
        mode:
          $ref: '#/components/schemas/ScreenerRunMode'
        trade_date:
          type: string
          format: date
          nullable: true
          description: Trading date (YYYY-MM-DD) for intraday snapshots.
        as_of:
          type: string
          format: date
          nullable: true
          description: End-of-day snapshot date (YYYY-MM-DD).
        label:
          type: string
          nullable: true
          description: Short label suitable for dropdowns/calendars.
        run_count:
          type: integer
          minimum: 0
          description: Number of runs committed for this date.
      required:
      - mode
      - run_count
    ScreenerRunDateList:
      type: object
      properties:
        mode:
          $ref: '#/components/schemas/ScreenerRunMode'
        latest:
          allOf:
          - $ref: '#/components/schemas/ScreenerRunDate'
          nullable: true
          description: Most recent date with a committed snapshot.
        dates:
          type: array
          items:
            $ref: '#/components/schemas/ScreenerRunDate'
      required:
      - mode
      - dates
    ScreenerRunSummary:
      type: object
      properties:
        mode:
          $ref: '#/components/schemas/ScreenerRunMode'
        run_id:
          $ref: '#/components/schemas/RunId'
          nullable: true
          description: Snapshot run identifier (intraday or EOD where available).
        trade_date:
          type: string
          format: date
          nullable: true
          description: Trading date (intraday).
        as_of:
          type: string
          format: date
          nullable: true
          description: End-of-day snapshot date.
        started_at:
          type: string
          format: date-time
          nullable: true
          description: UTC timestamp when the run started (if tracked).
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: UTC timestamp when the run finished writing the snapshot.
        label:
          type: string
          nullable: true
          description: Human-friendly label (e.g., "12:15 PM IST" or "Fri 24 Oct EOD").
      required:
      - mode
    ScreenerRunList:
      type: object
      properties:
        mode:
          $ref: '#/components/schemas/ScreenerRunMode'
        trade_date:
          type: string
          format: date
          nullable: true
          description: Trading date associated with the returned runs (intraday).
        as_of:
          type: string
          format: date
          nullable: true
          description: End-of-day date associated with the returned runs.
        latest:
          allOf:
          - $ref: '#/components/schemas/ScreenerRunSummary'
          nullable: true
          description: Most recent run for the given selection.
        items:
          type: array
          items:
            $ref: '#/components/schemas/ScreenerRunSummary'
      required:
      - mode
      - items
    TopMovers:
      type: object
      required: [period, generated_at, gainers, losers]
      properties:
        period:
          type: string
          enum: ["1d", "1w", "1m", "3m", "6m", "1y", "5y", "custom"]
        generated_at:
          type: string
          format: date-time
        run_id:
          type: string
          nullable: true
        as_of:
          type: string
          format: date
          nullable: true
        requested_start_date:
          type: string
          format: date
          nullable: true
        requested_end_date:
          type: string
          format: date
          nullable: true
        resolved_start_date:
          type: string
          format: date
          nullable: true
        resolved_end_date:
          type: string
          format: date
          nullable: true
        gainers:
          type: array
          items:
            $ref: '#/components/schemas/TopMoverEntry'
        losers:
          type: array
          items:
            $ref: '#/components/schemas/TopMoverEntry'
    TopMoverEntry:
      type: object
      required: [symbol, price, change_pct, next_action]
      properties:
        symbol:
          type: string
        name:
          type: string
          nullable: true
        sector:
          type: string
          nullable: true
        price:
          type: number
          format: double
        change_pct:
          type: number
          format: double
        score:
          type: number
          format: double
          nullable: true
        next_action:
          $ref: '#/components/schemas/DrawerNextAction'

    NextAction:
      type: object
      properties:
        code:
          type: string
          example: HOLD_TRAIL
        text:
          type: string
          example: Hold (trail stop at ₹3925.0)
        reasons:
          type: array
          items:
            type: string
          example:
          - Close ≥ EMA10
          - Momentum intact
        refs:
          type: object
          additionalProperties: true
          example:
            stop_now: 3925.0
            ema_n: 10
            ema_value: 3928.7
        action:
          type: string
          description: High-level recommendation verb
          enum:
          - BUY
          - HOLD
          - SELL
          - WATCH
          - ADD
          - TRIM
          - REDUCE
    PriceCandle:
      type: object
      properties:
        dt:
          type: string
          format: date
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: number
    IndicatorPoint:
      type: object
      properties:
        dt:
          type: string
          format: date
        key:
          type: string
          enum:
          - rsi
          - adx
          - ema12
          - ema26
          - ema50
          - ema200
          - obv
          - relvol
        value:
          type: number
    AlertRule:
      type: object
      properties:
        symbol:
          $ref: '#/components/schemas/Symbol'
        enabled:
          type: boolean
        channels:
          type: object
          properties:
            email:
              type: boolean
            desktop:
              type: boolean
            whatsapp:
              type: boolean
        conditions:
          type: object
          additionalProperties: true
      required:
      - symbol
      - enabled
    AlertState:
      type: object
      properties:
        id:
          type: integer
        rule:
          $ref: '#/components/schemas/AlertRule'
        last_fired_at:
          type: string
          format: date-time
          nullable: true
        muted_until:
          type: string
          format: date-time
          nullable: true
    AlertChannelStatus:
      type: object
      description: Aggregated delivery outcome for a single channel.
      properties:
        status:
          type: string
          description: Final status for the most recent attempt.
          enum:
          - SENT
          - FAILED
          - SKIPPED
        attempts:
          type: integer
          minimum: 1
          nullable: true
          description: Attempts performed for this channel.
        code:
          type: integer
          nullable: true
          description: Response/status code returned by channel (if any).
        reason:
          type: string
          nullable: true
          description: Reason for skipped/failed delivery (if available).
    AlertDeliveryAttempt:
      type: object
      description: Raw delivery attempt recorded for an alert event.
      properties:
        channel:
          type: string
          description: Channel identifier (e.g., ntfy, email, webhook).
        status:
          type: string
          enum:
          - SENT
          - FAILED
          - SKIPPED
        attempt_no:
          type: integer
          minimum: 1
        sent_at_utc:
          type: string
          format: date-time
          nullable: true
        response_code:
          type: integer
          nullable: true
        response_meta:
          type: object
          nullable: true
          additionalProperties: true
    AlertEvent:
      type: object
      required:
      - id
      - symbol
      - rule_code
      - severity
      - digest_bucket
      - mode
      - trading_date
      - bucket_ord
      - send_type
      - title_rendered
      - body_rendered
      - fired_at_utc
      properties:
        id:
          type: integer
        symbol:
          type: string
        rule_code:
          type: string
        severity:
          type: string
          enum:
          - INFO
          - WARN
          - CRITICAL
        digest_bucket:
          type: string
          enum:
          - BUY
          - SELL
          - MGMT
          - SCORE
        mode:
          type: string
          enum:
          - EOD
          - INTRADAY
        trading_date:
          type: string
          format: date
        fired_at_utc:
          type: string
          format: date-time
        bucket_ord:
          type: integer
        intraday_bucket_label:
          type: string
          nullable: true
        send_type:
          type: string
          enum:
          - IMMEDIATE
          - DIGEST
          - REALTIME
        digest_id:
          type: string
          nullable: true
        title_rendered:
          type: string
        body_rendered:
          type: string
        score_at_fire:
          type: number
          format: double
          nullable: true
        next_action_code:
          type: string
          nullable: true
        triggered_by:
          type: string
          enum:
          - SCHEDULE
          - MANUAL
          - STARTUP_CATCHUP
        profile:
          type: string
          nullable: true
        config_version:
          type: integer
          nullable: true
        context_json:
          type: object
          nullable: true
          additionalProperties: true
        details_json:
          type: object
          nullable: true
          additionalProperties: true
        channels_summary_json:
          type: object
          nullable: true
          additionalProperties:
            $ref: '#/components/schemas/AlertChannelStatus'
        deliveries:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/AlertDeliveryAttempt'
    HistoryRow:
      type: object
      properties:
        run_id:
          $ref: '#/components/schemas/RunId'
        symbol:
          $ref: '#/components/schemas/Symbol'
        outcome:
          type: string
        pnl_pct:
          type: number
        notes:
          type: string
    Settings:
      type: object
      description: Redacted YAML-backed settings surfaced to UI
      additionalProperties: true
    PositionIn:
      type: object
      properties:
        symbol:
          $ref: '#/components/schemas/Symbol'
        price:
          type: number
        as_of:
          type: string
          format: date-time
        note:
          type: string
      required:
      - symbol
      - price
      - as_of
    PositionOut:
      type: object
      required: [id, symbol, trade_on, created_at, updated_at]
      properties:
        id: { type: integer }
        symbol: { type: string }
        entry_price_locked:
          type: number
          format: double
          nullable: true         # NULL when unlocked
        qty:
          type: integer
          nullable: true
        stop_now:
          type: number
          format: double
          nullable: true
        exit_close_threshold:
          type: number
          format: double
          nullable: true
        breakeven_active:
          type: boolean
          default: false
        euphoria_on:
          type: boolean
          default: false
        trade_on:
          type: boolean
          default: false
        sell_price:
          type: number
          format: double
          nullable: true
        sold_at:
          type: string
          format: date-time
          nullable: true
        realized_pl:
          type: number
          format: double
          nullable: true
          description: Realized profit/loss (INR) when trade is closed.
        realized_pl_pct:
          type: number
          format: double
          nullable: true
          description: Realized profit/loss percentage relative to entry.
        note:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PositionCreate:              # lock
      type: object
      required: [symbol, price]
      properties:
        symbol: { type: string }
        price:
          type: number
          format: double
          minimum: 0
          exclusiveMinimum: true
        qty:
          type: integer
          nullable: true
        note:
          type: string
          nullable: true
        as_of:
          type: string
          format: date-time
          nullable: true

    PositionUpdate:              # partial fields; NOT allowed to change entry_price_locked
      type: object
      properties:
        qty:
          type: integer
          nullable: true
        stop_now:
          type: number
          format: double
          nullable: true
        exit_close_threshold:
          type: number
          format: double
          nullable: true
        breakeven_active:
          type: boolean
        euphoria_on:
          type: boolean
        trade_on:
          type: boolean
        sell_price:
          type: number
          format: double
          nullable: true
        sold_at:
          type: string
          format: date-time
          nullable: true
        note:
          type: string
          nullable: true

    PositionUpsert:
      type: object
      description: >
        Partial update used by PUT /api/v1/positions/{symbol}. All fields are optional; only send the fields
        you want to set/update. Server canonicalizes the symbol from the path and returns a PositionOut.
      additionalProperties: false
      properties:
        entry_price_locked:
          type: number
          minimum: 0
          description: Locked entry chosen by user (₹).
        qty:
          type: integer
          minimum: 0
          description: Position size (shares/units).
        trade_on:
          type: boolean
          description: Whether trade/position is active for this symbol.
        stop_now:
          type: number
          minimum: 0
          description: Current trailing/soft stop level (₹).
        exit_close_threshold:
          type: number
          minimum: 0
          description: Close-below threshold to trigger exit (₹).
        sell_price:
          type: number
          minimum: 0
          description: Optional exit price when closing (INR).
        sold_at:
          type: string
          format: date-time
          description: Timestamp trade was closed (UTC).
        breakeven_active:
          type: boolean
          description: Whether breakeven rule is active.
        euphoria_on:
          type: boolean
          description: Whether “euphoria” guardrail is active.
        note:
          type: string
          maxLength: 2000
          description: Free-form note saved with the position.

    SnapshotPinIn:
      type: object
      properties:
        symbol:
          $ref: '#/components/schemas/Symbol'
        run_id:
          $ref: '#/components/schemas/RunId'
      required:
      - symbol
      - run_id
    SnapshotPinOut:
      allOf:
      - $ref: '#/components/schemas/SnapshotPinIn'
      - type: object
        properties:
          id:
            type: integer
          created_at:
            type: string
            format: date-time
    DrawerDetail:
      type: object
      required:
        - drawer_contract_version
        - symbol
        - trading_day
        - header
        - sparkline
        - score_breakdown
        - action_block
        - meters
        - next_action
        - diagnostics
      properties:
        drawer_contract_version:
          type: string
          example: "1.0.0"
          description: Semantic version for the drawer contract.
        scoring_rules_version:
          type: string
          example: "scores_v2"
          description: Version tag emitted by scoring layer.
        symbol:
          type: string
          example: "RELIANCE.NS"
        trading_day:
          type: string
          format: date
          example: "2025-09-19"
          description: Latest completed trading day used for this view.
        intraday_numerator_used:
          type: boolean
          example: false
          description: True if any intraday values were used in composing this card.
        header:
          $ref: '#/components/schemas/DrawerHeader'
        sparkline:
          $ref: '#/components/schemas/DrawerSparkline'
        score_breakdown:
          $ref: '#/components/schemas/DrawerScoreBreakdown'
        position:
          $ref: '#/components/schemas/DrawerPosition'
        action_block:
          $ref: '#/components/schemas/DrawerActionBlock'
        meters:
          $ref: '#/components/schemas/DrawerMeters'
        next_action:
          $ref: '#/components/schemas/DrawerNextAction'
        alerts:
          $ref: '#/components/schemas/DrawerAlerts'
        diagnostics:
          $ref: '#/components/schemas/DrawerDiagnostics'
        selection:
          $ref: '#/components/schemas/DrawerSelection'
          nullable: true
        candidate_pool:
          $ref: '#/components/schemas/CandidatePoolEntry'
          nullable: true
          description: Snapshot of this symbol inside the buy candidate pool (rank, health, reasons).
        news_recent_hours:
          type: integer
          description: Default lookback window (hours) for the right-drawer news tab.
          example: 168

        # -------- Backward-compatibility aliases (deprecated) --------
        run_id:
          type: string
          deprecated: true
        as_of:
          type: string
          format: date-time
          deprecated: true
        name:
          type: string
          deprecated: true
        sector:
          type: string
          deprecated: true
        price:
          type: number
          format: double
          deprecated: true
          description: Use header.price instead.
        pct_today:
          type: number
          format: double
          deprecated: true
          description: Use header.pct_1d instead.
        score:
          type: integer
          minimum: 0
          maximum: 100
          deprecated: true
          description: Use score_breakdown.score_total_0_100.
        indicators:
          type: object
          additionalProperties: true
          deprecated: true
        badges:
          type: array
          items:
            $ref: '#/components/schemas/LegacyBadge'
          deprecated: true
        method_pill:
          type: string
          deprecated: true
        alert_templates:
          type: array
          items:
            type: string
          deprecated: true
        channels:
          nullable: true
          deprecated: true

    DrawerHeader:
      type: object
      required: [name, price, pct_1d, badges]
      properties:
        name:
          type: string
          example: "Tata Consultancy Services"
        sector:
          type: string
          nullable: true
          example: "IT"
        price:
          type: number
          format: double
          example: 4521.5
        pct_1d:
          type: number
          format: double
          example: 2.4
        badges:
          type: array
          items:
            $ref: '#/components/schemas/Badge'

    Badge:
      type: object
      required: [category, label]
      properties:
        category:
          type: string
          enum: [BREAKOUT, MOMENTUM, WATCH, IGNORE,ACTION]
        label:
          type: string
          example: "🚀 Very High Breakout"

    LegacyBadge:
      type: object
      properties:
        code:
          type: string
        text:
          type: string
        key:
          nullable: true
        label:
          nullable: true
        color:
          nullable: true

    DrawerSparkline:
      type: object
      required: [prices_30d]
      properties:
        prices_30d:
          type: array
          items: { type: number, format: double }
          minItems: 1
        ema10_30d:
          type: array
          items: { type: number, format: double }
          description: Optional overlay; same length as prices_30d when present.
        dates_30d:
          type: array
          items:
            type: string
            format: date
          description: ISO trading dates aligned 1:1 with prices_30d.

    DrawerScoreBreakdown:
      type: object
      required: [score_total_0_100, rsi14, adx14, relvol20, trend_rank, breakout_quality]
      properties:
        score_total_0_100:
          type: integer
          minimum: 0
          maximum: 100
          description: Canonical score (Full when available; else normalized Basic).
        score_source:
          type: string
          enum: [full, basic_fallback]
        score_basic:
          type: integer
          minimum: 0
          maximum: 12
          nullable: true
        score_basic_normalized:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
        rsi14:
          type: number
          format: double
        adx14:
          type: number
          format: double
        relvol20:
          type: number
          format: double
        trend_rank:
          type: integer
          minimum: 0
          maximum: 10
        breakout_quality:
          type: integer
          minimum: 0
          maximum: 10
        proximity_52w_high_pct:
          type: number
          format: double
          nullable: true
        pivot_clear_pct:
          type: number
          format: double
          nullable: true
        base_len_bars:
          type: integer
          nullable: true
        data_gaps:
          type: array
          items: { type: string }
          description: Missing inputs when basic_fallback is used.
        stale:
          type: boolean
          description: True when score_source is basic_fallback.

    DrawerPosition:
      type: object
      properties:
        entry_price_locked:
          type: number
          format: double
          nullable: true
        qty:
          type: integer
          nullable: true

    DrawerActionBlock:
      type: object
      required: [breakeven_state, euphoria_state]
      properties:
        stop_now:
          type: number
          format: double
          nullable: true
        stop_method:
          type: string
          enum: [ATRxK, EMA_tight]
          nullable: true
        exit_close_threshold:
          type: number
          format: double
          nullable: true
        breakeven_state:
          type: string
          enum: [Pending, Active]
        euphoria_state:
          type: string
          enum: [Off, On]

    DrawerMeters:
      type: object
      required: [risk, euphoria]
      properties:
        risk:
          $ref: '#/components/schemas/Meter'
        euphoria:
          $ref: '#/components/schemas/Meter'

    Meter:
      type: object
      required: [level, score_0_100, basis, thresholds]
      properties:
        level:
          type: string
          enum: [Low, Medium, High]
        score_0_100:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
          description: Quantitative calibration for the meter; null if not computable.
        basis:
          type: object
          additionalProperties: true
          description: Raw inputs used to compute the meter (e.g., atr14_pct, rsi14, adx14).
        thresholds:
          type: object
          required: [low_lt, medium_gte, high_gte]
          properties:
            low_lt:
              type: integer
              example: 33
            medium_gte:
              type: integer
              example: 33
            high_gte:
              type: integer
              example: 66

    DrawerNextAction:
      type: object
      required: [code, text, refs]
      properties:
        code:
          type: string
          enum:
            - SELL_NOW
            - SELL_TOMORROW
            - HOLD
            - HOLD_BREAKEVEN
            - HOLD_TIGHT
            - BUY_BREAKOUT
            - BUY_PULLBACK
            - BUY_STARTER
            - WATCH
            - IGNORE
        text:
          type: string
          example: "Hold — Trail stop at ₹4382.0"
        reasons:
          type: array
          items: { type: string }
        refs:
          type: object
          additionalProperties: { type: number, format: double }
          description: Numeric references used in the text (e.g., S/E/pivot/entry/A/B).

    DrawerAlerts:
      type: object
      properties:
        suggestions:
          type: array
          items: { type: string }
        recent_events:
          type: array
          description: Alerts fired for this symbol during the recent lookback window.
          items:
            $ref: '#/components/schemas/DrawerAlertEvent'

    DrawerAlertEvent:
      type: object
      required:
        - id
        - symbol
        - trading_day
        - fired_at_utc
        - rule_code
        - severity
        - digest_bucket
        - title
      properties:
        id:
          type: integer
          format: int64
          example: 12345
        symbol:
          type: string
          example: RELIANCE.NS
        trading_day:
          type: string
          format: date
          description: Trading date associated with the alert.
          example: '2025-10-24'
        fired_at_utc:
          type: string
          format: date-time
          description: Timestamp when the alert fired (UTC).
          example: '2025-10-24T10:12:00Z'
        rule_code:
          type: string
          description: Rule identifier that triggered the alert.
          example: MOMENTUM_BREAKOUT
        severity:
          type: string
          description: Normalized severity label.
          example: WARN
        digest_bucket:
          type: string
          description: Digest bucket classification.
          example: BUY
        mode:
          type: string
          nullable: true
          description: Snapshot mode when alert fired.
          example: INTRADAY
        title:
          type: string
          description: Rendered alert title.
          example: "Breakout strength improving"
        body:
          type: string
          nullable: true
          description: Rendered alert body/summary text.
          example: "Score crossed 80 with ADX rising and RelVol 1.8x"
        score_at_fire:
          type: number
          format: float
          nullable: true
          description: Momentum score at the time of firing.
          example: 82.5
        next_action_code:
          type: string
          nullable: true
          description: Next action code at the time of firing.
          example: BUY_BREAKOUT
        channels_summary:
          type: object
          nullable: true
          additionalProperties: { type: object }
          description: Delivery status keyed by channel.

    BuyCheck:
      type: object
      required: [code, label, rule, actual, pass]
      properties:
        code:
          type: string
          description: Stable identifier for the gate factor.
          example: min_score
        label:
          type: string
          description: Human-readable gate name.
          example: Score
        rule:
          type: string
          description: Textual rule applied to the gate.
          example: ">= 70"
        actual:
          type: string
          description: Formatted value observed for the gate.
          example: "81"
        pass:
          type: boolean
          description: Indicates whether the gate passed.
        value:
          type: number
          nullable: true
          description: Optional numeric representation of the observed value.

    BuyEvaluation:
      type: object
      required: [flag, profile, mode, pass_count, total_count, checks, failed_codes]
      properties:
        flag:
          type: boolean
          description: True when all enforced buy gates passed.
        profile:
          type: string
          nullable: true
          description: Active buy profile key (e.g., swing_eod, intraday_breakout).
          example: swing_eod
        mode:
          type: string
          nullable: true
          description: Evaluation mode used for the buy gates.
          enum: [EOD, INTRADAY]
        pass_count:
          type: integer
          description: Number of enforced gates that passed.
          example: 8
        total_count:
          type: integer
          description: Total enforced gates evaluated.
          example: 9
        checks:
          type: array
          description: Checklist rows for the enforced gates.
          items:
            $ref: '#/components/schemas/BuyCheck'
        failed_codes:
          type: array
          description: Codes of the enforced gates that failed.
          items:
            type: string
        enforced_checks:
          type: array
          nullable: true
          description: Snapshot of enforced gate codes applied during evaluation.
          items:
            type: string
        reasons_inline:
          type: string
          nullable: true
          description: Inline summary of the buy reasons.
        eval_ts:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the buy evaluation was performed.

    DrawerDiagnostics:
      type: object
      required: [reason, rules_version]
      properties:
        reason:
          type: string
          example: "Yes — 86/100. strong momentum, trend strong, pivot cleared, volume strong"
        reason_text:
          type: string
          nullable: true
          description: Optional natural-language explanation; may be same as reason.
        rules_version:
          type: string
          example: "scores_v2"
        blocked_reason:
          type: string
          nullable: true
        buy_checklist:
          $ref: '#/components/schemas/DrawerDiagnosticsBuyChecklist'
        buy_evaluation:
          $ref: '#/components/schemas/BuyEvaluation'
        buy_reasons_inline:
          type: string
          nullable: true
        buy_failed_codes:
          type: array
          nullable: true
          items:
            type: string
    DrawerDiagnosticsBuyChecklist:
      type: object
      required: [label, mode, passed, passed_items, total_items, summary, items]
      properties:
        label:
          type: string
          description: Display label for this checklist section.
          example: "BUY (EOD gates)"
        mode:
          type: string
          description: Evaluation mode used for the gate checks.
          enum: [EOD, INTRADAY]
        passed:
          type: boolean
          description: True when the enforced gates passed.
        passed_items:
          type: integer
          description: Count of gates that passed.
          example: 7
        total_items:
          type: integer
          description: Total gates evaluated.
          example: 9
        summary:
          type: string
          description: Human-readable verdict aligned with the buy flag.
          example: "No — 7 / 9 passed"
        fail_summary:
          type: string
          nullable: true
          description: Short summary of failing gates when the checklist fails.
          example: "ATR10% too low; Base length too short"
        items:
          type: array
          items:
            $ref: '#/components/schemas/DrawerDiagnosticsBuyChecklistItem'
    DrawerDiagnosticsBuyChecklistItem:
      type: object
      required: [code, factor, value_display, value_vs_rule, description, passed]
      properties:
        code:
          type: string
          description: Stable identifier for the gate factor.
          example: "score"
        factor:
          type: string
          description: Human-readable gate name.
          example: "Score"
        value_display:
          type: string
          description: Formatted observed value.
          example: "81"
        rule_display:
          type: string
          nullable: true
          description: Formatted rule or threshold.
          example: "≥ 70"
        value_vs_rule:
          type: string
          description: Combined display of the value against the rule.
          example: "81 ≥ 70"
        description:
          type: string
          description: Short explanation of what the outcome means.
          example: "strong overall quality"
        passed:
          type: boolean
          description: True when the gate passed.
    ScanRequest:
      type: object
      additionalProperties: false
      properties:
        key:
          type: string
          description: Optional client-generated idempotency key (1–64 chars, [A-Za-z0-9_-])
        as_of:
          type: string
          format: date
          nullable: true
          description: Optional date to backfill / label the snapshot
        universe:
          type: string
          nullable: true
          description: Optional universe preset (e.g., NIFTY500)
        notes:
          type: string
          nullable: true
          description: Free-text note for this run
    NewsEventType:
      type: string
      description: Normalized catalyst/event category for a news item
      enum: [results, order_win, pledge, rating_change, regulatory, court, mna, guidance, mgmt_change, macro, other]

    NewsSentiment:
      type: string
      enum: [positive, negative, mixed, neutral]

    NewsSourceRef:
      type: object
      required: [publisher, url]
      properties:
        publisher:
          type: string
          example: Moneycontrol
        url:
          type: string
          format: uri
        paywalled:
          type: boolean
          default: false

    NewsCard:
      type: object
      required: [cluster_id, symbol, published, title, event_type, bullets, why, confidence_stars, source_count, sources]
      properties:
        cluster_id:
          type: string
          example: clu_x1y2z3
        symbol:
          type: string
          description: Canonical symbol tagged to this news cluster
        published:
          type: string
          format: date-time
          description: Earliest seen publish time (IST)
        title:
          type: string
        event_type:
          $ref: "#/components/schemas/NewsEventType"
        bullets:
          type: array
          minItems: 1
          items: { type: string }
          description: 2–5 factual points; engine decides length
        why:
          type: string
          description: One-line reason why this matters for price/momentum
        sentiment:
          $ref: "#/components/schemas/NewsSentiment"
        confidence_stars:
          type: integer
          minimum: 1
          maximum: 3
        consensus_score:
          type: number
          format: float
          minimum: 0
          maximum: 1
        source_count:
          type: integer
          minimum: 1
        sources:
          type: array
          items: { $ref: "#/components/schemas/NewsSourceRef" }
        impact_score:
          type: number
          format: float
          minimum: 0
          maximum: 1
          nullable: true
          description: Ranking score used when explaining a move
        correlation_note:
          type: string
          nullable: true
          description: e.g., "Appeared 12m before price spike"
        source_primary:
          type: string
          description: Primary publisher for display (first source)
          nullable: true
        source_url:
          type: string
          format: uri
          description: Primary URL for display (first source)
          nullable: true        

    NewsListResponse:
      type: object
      required: [symbol, window, page, per_page, items]
      properties:
        symbol:
          type: string
        window:
          type: object
          required: [from, to]
          properties:
            from: { type: string, format: date-time }
            to:   { type: string, format: date-time }
        page: { type: integer }
        per_page: { type: integer }
        items:
          type: array
          items: { $ref: "#/components/schemas/NewsCard" }
        next_page:
          type: integer
          nullable: true
        note:
          type: string
          nullable: true

    NewsWindowListResponse:
      type: object
      required: [window, page, per_page, items]
      properties:
        window:
          type: object
          required: [from, to]
          properties:
            from: { type: string, format: date-time }
            to:   { type: string, format: date-time }
        page: { type: integer }
        per_page: { type: integer }
        items:
          type: array
          items: { $ref: "#/components/schemas/NewsCard" }
        next_page:
          type: integer
          nullable: true
        note:
          type: string
          nullable: true

    NewsIngestItem:
      type: object
      required: [cluster_id, symbol, published, title, event_type, bullets, why, sentiment, confidence_stars, consensus_score, source_count, sources]
      properties:
        cluster_id: { type: string }
        symbol:     { type: string }
        published:  { type: string, format: date-time }
        title:      { type: string }
        event_type: { $ref: "#/components/schemas/NewsEventType" }
        bullets:
          type: array
          minItems: 1
          items: { type: string }
        why:        { type: string }
        sentiment:  { $ref: "#/components/schemas/NewsSentiment" }
        confidence_stars:
          type: integer
          minimum: 1
          maximum: 3
        consensus_score:
          type: number
          format: float
          minimum: 0
          maximum: 1
        source_count:
          type: integer
          minimum: 1
        sources:
          type: array
          items: { $ref: "#/components/schemas/NewsSourceRef" }

    NewsIngestBatch:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/NewsIngestItem" }

    NewsAttributionItem:
      type: object
      required: [cluster_id, decision, impact_score, card]
      properties:
        cluster_id: { type: string }
        decision:
          type: string
          enum: [likely, possible, none]
        impact_score:
          type: number
          format: float
          minimum: 0
          maximum: 1
        card:
          $ref: "#/components/schemas/NewsCard"

    NewsMoveAttributionResponse:
      type: object
      required: [symbol, at, lookback_min, items]
      properties:
        symbol: { type: string }
        at:     { type: string, format: date-time }
        lookback_min: { type: integer }
        items:
          type: array
          items: { $ref: "#/components/schemas/NewsAttributionItem" }

    DrawerSelection:
      type: object
      properties:
        selected:
          type: boolean
        reason:
          type: string
          nullable: true
        stop_price:
          type: number
          format: float
          nullable: true
        target_price:
          type: number
          format: float
          nullable: true
        r_multiple:
          type: number
          format: float
          nullable: true
        run_id:
          type: string
          nullable: true
        trading_day:
          type: string
          nullable: true

    CandidatePoolExitCheck:
      type: object
      required: [code, label, pass]
      properties:
        code:
          type: string
          description: Exit rule identifier.
          enum: [ema20, adx14, prox52w, age]
        label:
          type: string
          example: ADX14
        pass:
          type: boolean
          description: True when the relaxed exit rule is satisfied.
        value:
          type: number
          format: double
          nullable: true
        threshold:
          type: number
          format: double
          nullable: true
        note:
          type: string
          nullable: true

    CandidatePoolEntry:
      type: object
      required: [symbol, rank, added_on, status, exit_checks]
      properties:
        symbol:
          type: string
          example: RELIANCE.NS
        rank:
          type: integer
          format: int32
          example: 1
        rank_score:
          type: number
          format: double
          nullable: true
          description: Weighted score used for ordering the pool (0..1 normalized).
        added_on:
          type: string
          format: date
          description: Trading date when the symbol first entered the pool.
        added_at:
          type: string
          format: date-time
          nullable: true
        added_run_id:
          type: string
          nullable: true
        added_as_of:
          type: string
          nullable: true
          description: EOD as-of label used when the symbol was added.
        last_seen_run_id:
          type: string
          nullable: true
        last_seen_as_of:
          type: string
          nullable: true
        last_price:
          type: number
          format: double
          nullable: true
        score:
          type: number
          format: double
          nullable: true
        adx14:
          type: number
          format: double
          nullable: true
        atr_pct:
          type: number
          format: double
          nullable: true
        r_multiple:
          type: number
          format: double
          nullable: true
        prox_52w_high_pct:
          type: number
          format: double
          nullable: true
        liquidity:
          type: number
          format: double
          nullable: true
        ema20:
          type: number
          format: double
          nullable: true
        status:
          type: string
          enum: [strong, weakening, exit_soon, removed]
        exit_checks:
          type: array
          items:
            $ref: '#/components/schemas/CandidatePoolExitCheck'
        reasons:
          type: array
          items: { type: string }
        stale:
          type: boolean
          description: True when no fresh snapshot updated this member on the latest run.
        is_top_candidate:
          type: boolean
          description: True when this is the current BUY_SELECTED candidate (rank #1).

    CandidatePoolList:
      type: object
      required: [max_size, items]
      properties:
        max_size:
          type: integer
          format: int32
          example: 10
        run_id:
          type: string
          nullable: true
        as_of:
          type: string
          nullable: true
          description: Snapshot label (as_of for EOD) associated with the latest pool update.
        generated_at:
          type: string
          format: date-time
          nullable: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/CandidatePoolEntry'
