openapi: 3.1.0
info:
  title: Momentum Dashboard API
  version: 0.7.0   # bump
  summary: OpenAPI-first contracts for React + FastAPI app (Parquet+SQLite).
  description: Contract-first spec. Clients must be generated from this file. All endpoints are local-only and authenticated as N/A for now.
servers:
  - url: http://localhost:8000/api/v1

tags:
  - name: Health
  - name: Screener
  - name: Runs
  - name: Universe
  - name: Instruments
  - name: Positions
  - name: Snapshots
  - name: Alerts
  - name: Watchlist
  - name: History
  - name: Settings
  - name: Learning

paths:

  /health:
    get:
      tags: [Health]
      operationId: health
      summary: Quick health (combined)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthState' }
              examples:
                example: { $ref: '#/components/examples/Health' }

  /health/live:
    get:
      tags: [Health]
      operationId: healthLive
      summary: Liveness probe
      responses:
        '200': { description: Live }

  /health/ready:
    get:
      tags: [Health]
      operationId: healthReady
      summary: Readiness probe (SQLite + Parquet availability)
      responses:
        '200': { description: Ready }
        '503':
          description: Not ready
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                example: { $ref: '#/components/examples/Problem503' }

  /health/metrics:
    get:
      tags: [Health]
      operationId: metrics
      summary: Prometheus metrics (optional)
      responses:
        '200':
          description: Prometheus exposition
          content:
            text/plain:
              schema: { type: string }

  /api/v1/screener:
    get:
      tags: [Screener]
      summary: List screener rows (filtered, sorted, paginated)
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: per_page
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 100 }
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [score, pct_today, rsi, adx, proximity_52w_high, relvol20, price, name, sector, wk_change, wk_change_pct]
            default: score
        - name: sort_dir
          in: query
          schema: { type: string, enum: [asc, desc], default: desc }
        - name: universe
          in: query
          schema: { type: string, enum: [NIFTY50, NIFTY100, NIFTY500, MIDCAP, SMALLCAP, ALL] }
        - name: sector_in
          in: query
          schema: { type: array, items: { type: string } }
          style: form
          explode: true
        - name: score_min
          in: query
          schema: { type: number }
        - name: rsi_min
          in: query
          schema: { type: number }
        - name: rsi_max
          in: query
          schema: { type: number }
        - name: adx_min
          in: query
          schema: { type: number }
        - name: price_min
          in: query
          schema: { type: number }
        - name: price_max
          in: query
          schema: { type: number }
        - name: pct_today_min
          in: query
          schema: { type: number }
        - name: proximity_52w_high_max
          in: query
          schema: { type: number, description: "Within X% of 52W high if <= X" }
        - name: watchlist_only
          in: query
          schema: { type: boolean, default: false }
        - name: stale_exclude
          in: query
          schema: { type: boolean, default: true }
        - name: run_id
          in: query
          schema: { type: string, description: "If omitted, server uses latest snapshot" }
      responses:
        "200":
          description: Screener result page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScreenerList"

  /scan:
    post:
      tags: [Screener]
      operationId: postScan
      summary: Trigger on-demand scan (idempotent)
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id: { $ref: '#/components/schemas/RunId' }
              examples:
                example:
                  value: { run_id: "20250101153000" }
        '429':
          description: Rate limited
          headers:
            Retry-After: { $ref: '#/components/headers/RetryAfter' }
            X-RateLimit-Limit: { $ref: '#/components/headers/XRateLimitLimit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/XRateLimitRemaining' }
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /runs:
    get:
      tags: [Runs]
      operationId: listRuns
      summary: List recent scan runs
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Runs
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/RunSummary' }
                  pagination: { $ref: '#/components/schemas/Pagination' }
              examples:
                example: { $ref: '#/components/examples/Runs' }

  /runs/{run_id}:
    get:
      tags: [Runs]
      operationId: getRun
      summary: Run details
      parameters:
        - name: run_id
          in: path
          required: true
          schema: { $ref: '#/components/schemas/RunId' }
      responses:
        '200':
          description: Run detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunDetail' }
              examples:
                example:
                  value:
                    run_id: "20250101153000"
                    job_name: "scan_every_15m"
                    started_at: "2025-01-01T15:30:00Z"
                    ended_at: "2025-01-01T15:30:12Z"
                    status: "SUCCEEDED"
                    counts: { symbols_processed: 500, rows_written: 500 }
        '404':
          description: Not found
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /universe:
    get:
      tags: [Universe]
      operationId: listUniverse
      summary: List/search universe (symbols)
      parameters:
        - $ref: '#/components/parameters/IfNoneMatch'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - name: q
          in: query
          schema: { type: string }
        - name: sector
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Universe list
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/UniverseInstrument' }
                  pagination: { $ref: '#/components/schemas/Pagination' }
              examples:
                example: { $ref: '#/components/examples/UniverseList' }
        '304': { description: Not Modified }

  /universe/sectors:
    get:
      tags: [Universe]
      operationId: listSectors
      summary: Sector facets with counts
      responses:
        '200':
          description: Sectors
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SectorFacet' }
              examples:
                example: { $ref: '#/components/examples/Sectors' }

  /instruments:
    get:
      tags: [Instruments]
      operationId: listInstruments
      summary: Search/autocomplete instruments
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Instruments
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/UniverseInstrument' }
                  pagination: { $ref: '#/components/schemas/Pagination' }

  /instruments/{symbol}/detail:
    get:
      tags: [Instruments]
      operationId: getInstrumentDetail
      summary: Drawer detail for a symbol
      parameters:
        - $ref: '#/components/parameters/Symbol'
      responses:
        '200':
          description: Drawer detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DrawerDetail' }
              examples:
                example: { $ref: '#/components/examples/Detail' }
        '404':
          description: Not found
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /instruments/{symbol}/prices:
    get:
      tags: [Instruments]
      operationId: getInstrumentPrices
      summary: Price slice for sparkline
      parameters:
        - $ref: '#/components/parameters/Symbol'
        - name: range
          in: query
          description: e.g., 30d, 90d, 1y
          schema: { type: string }
      responses:
        '200':
          description: OHLCV candles
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/PriceCandle' }

  /instruments/{symbol}/indicators:
    get:
      tags: [Instruments]
      operationId: getInstrumentIndicators
      summary: Indicator slice for chart tabs
      parameters:
        - $ref: '#/components/parameters/Symbol'
        - name: range
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Indicator points
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/IndicatorPoint' }

  /positions:
    get:
      tags: [Positions]
      operationId: listPositions
      summary: List locked positions (optional filter by symbol)
      parameters:
        - name: symbol
          in: query
          schema: { $ref: '#/components/schemas/Symbol' }
      responses:
        '200':
          description: Positions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/PositionOut' }
              examples:
                example: { $ref: '#/components/examples/Positions' }
    post:
      tags: [Positions]
      operationId: createPosition
      summary: Lock price / anchor baseline
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PositionIn' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PositionOut' }

  /positions/{id}:
    put:
      tags: [Positions]
      operationId: updatePosition
      summary: Update note/price/date
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PositionIn' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PositionOut' }
    delete:
      tags: [Positions]
      operationId: deletePosition
      summary: Remove locked position
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204': { description: Deleted }

  /snapshots/pin:
    post:
      tags: [Snapshots]
      operationId: pinSnapshot
      summary: Pin a snapshot for a symbol
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SnapshotPinIn' }
      responses:
        '201':
          description: Pinned
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SnapshotPinOut' }

  /snapshots/pins:
    get:
      tags: [Snapshots]
      operationId: listSnapshotPins
      summary: List pins (optionally by symbol)
      parameters:
        - name: symbol
          in: query
          schema: { $ref: '#/components/schemas/Symbol' }
      responses:
        '200':
          description: Pins
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SnapshotPinOut' }
              examples:
                example: { $ref: '#/components/examples/Pins' }

  /snapshots/pin/{id}:
    delete:
      tags: [Snapshots]
      operationId: unpinSnapshot
      summary: Remove a pin
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204': { description: Unpinned }

  /alerts:
    get:
      tags: [Alerts]
      operationId: listAlerts
      summary: List alert rules and states
      responses:
        '200':
          description: Alerts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AlertState' }
              examples:
                example: { $ref: '#/components/examples/Alerts' }
    post:
      tags: [Alerts]
      operationId: createAlert
      summary: Create alert rule
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AlertRule' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AlertState' }

  /alerts/{id}:
    put:
      tags: [Alerts]
      operationId: updateAlert
      summary: Update alert rule
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AlertRule' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AlertState' }
    delete:
      tags: [Alerts]
      operationId: deleteAlert
      summary: Delete alert rule
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204': { description: Deleted }

  /alerts/digest:
    get:
      tags: [Alerts]
      operationId: previewAlertDigest
      summary: Preview digest (no send)
      responses:
        '200':
          description: Digest preview
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /watchlist:
    get:
      tags: [Watchlist]
      operationId: getWatchlist
      summary: Get user watchlists & symbols
      responses:
        '200':
          description: Watchlists
          content:
            application/json:
              schema:
                type: object
                properties:
                  lists:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        symbols:
                          type: array
                          items: { $ref: '#/components/schemas/Symbol' }
              examples:
                example: { $ref: '#/components/examples/Watchlist' }
    post:
      tags: [Watchlist]
      operationId: addToWatchlist
      summary: Add symbols (optionally create list)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                symbols:
                  type: array
                  items: { $ref: '#/components/schemas/Symbol' }
              required: [symbols]
      responses:
        '201': { description: Added }

  /watchlist/{symbol}:
    delete:
      tags: [Watchlist]
      operationId: removeFromWatchlist
      summary: Remove symbol from default or named list
      parameters:
        - $ref: '#/components/parameters/Symbol'
        - name: list
          in: query
          schema: { type: string }
      responses:
        '204': { description: Removed }

  /history:
    get:
      tags: [History]
      operationId: listHistory
      summary: Historical outcomes (linked to run_id)
      parameters:
        - name: date
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: History
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/HistoryRow' }
              examples:
                example: { $ref: '#/components/examples/History' }

  /settings:
    get:
      tags: [Settings]
      operationId: getSettings
      summary: Read redacted YAML-backed settings
      responses:
        '200':
          description: Settings
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Settings' }
              examples:
                example: { $ref: '#/components/examples/Settings' }
    put:
      tags: [Settings]
      operationId: putSettings
      summary: Update settings (validated)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Settings' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Settings' }

  /learning:
    get:
      tags: [Learning]
      operationId: getLearning
      summary: Static learning content
      responses:
        '200':
          description: Content
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

components:

  parameters:
    Symbol:
      name: symbol
      in: path
      required: true
      schema: { $ref: '#/components/schemas/Symbol' }
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    PerPage:
      name: per_page
      in: query
      schema: { type: integer, minimum: 1, maximum: 2000, default: 100 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string }
    IfNoneMatch:
      name: If-None-Match
      in: header
      schema: { type: string }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema: { type: string }

  headers:
    ETag:
      description: Entity tag of response payload
      schema: { type: string }
    RetryAfter:
      description: Seconds to retry after rate limit
      schema: { type: string }
    XRateLimitLimit:
      description: Request limit window
      schema: { type: integer }
    XRateLimitRemaining:
      description: Remaining requests in window
      schema: { type: integer }

  schemas:
    Symbol:
      type: string
      description: Canonical uppercase ticker
      example: "RELIANCE"
    RunId:
      type: string
      description: UTC timestamp yyyymmddHHMMss
      pattern: '^[0-9]{14}$'
      example: "20250101153000"

    RunSummary:
      type: object
      properties:
        run_id: { $ref: '#/components/schemas/RunId' }
        job_name: { type: string }
        started_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time, nullable: true }
        status: { type: string, enum: [PENDING, RUNNING, SUCCEEDED, FAILED] }
      required: [run_id, job_name, started_at, status]

    RunDetail:
      allOf:
        - $ref: '#/components/schemas/RunSummary'
        - type: object
          properties:
            counts:
              type: object
              properties:
                symbols_processed: { type: integer }
                rows_written: { type: integer }
            error: { type: string, nullable: true }
    Pagination:
      type: object
      properties:
        page: { type: integer }
        per_page: { type: integer }
        total: { type: integer, nullable: true }
        next_cursor: { type: string, nullable: true }

    Problem:
      type: object
      required: [type, title, status]
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        code:
          type: string
          description: App-specific error code
          enum: [VALIDATION_ERROR, RATE_LIMITED, SNAPSHOT_CONFLICT, NOT_FOUND]
        errors:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              message: { type: string }

    HealthState:
      type: object
      properties:
        status: { type: string }
        details:
          type: object
          additionalProperties: true

    UniverseInstrument:
      type: object
      properties:
        symbol: { $ref: '#/components/schemas/Symbol' }
        name: { type: string }
        sector: { type: string }
        active: { type: boolean }
      required: [symbol, name]

    SectorFacet:
      type: object
      properties:
        sector: { type: string }
        count: { type: integer }

    Score:
      type: object
      properties:
        total: { type: number }
        momentum_12_1m: { type: number }
        momentum_6m: { type: number }
        momentum_3m: { type: number }
        momentum_1m: { type: number }
        rsi_component: { type: number }
        adx_component: { type: number }
        volatility_penalty: { type: number }

    Badge:
      type: object
      properties:
        code: { type: string, example: "very_high_breakout" }
        text: { type: string, example: "Very High Breakout" }

    ScreenerRow:
      type: object
      # Keep required minimal to avoid breaking; others are optional but documented.
      required: [symbol, last, change_pct, score]
      properties:
        symbol:            { type: string, example: "RELIANCE" }
        name:              { type: string, example: "Reliance Industries" }
        sector:            { type: string, example: "Energy" }
        last:              { type: number, format: float, example: 2700.5 }
        change_pct:        { type: number, format: float, example: 1.2 }

        wk_change:         { type: number, format: float, nullable: true, example: 35.8 }
        wk_change_pct:     { type: number, format: float, nullable: true, example: 1.35 }
        badges:
          type: array
          items: { $ref: "#/components/schemas/Badge" }

        score:             { type: number, format: float, example: 78 }
        strength:          { type: string, example: "Moderate" }

        rsi:               { type: number, format: float, example: 59.32 }
        adx:               { type: number, format: float, example: 17.91 }
        ret_12_1m:         { type: number, format: float, example: 15.4 }
        ret_6m:            { type: number, format: float, example: 10.8 }
        ret_3m:            { type: number, format: float, example: 6.1 }
        ret_1m:            { type: number, format: float, example: 2.3 }

        pct_from_52w_high: { type: number, format: float, example: -4.2 }
        atr_pct:           { type: number, format: float, example: 2.1 }
        liquidity:         { type: number, format: float, example: 180000000 }
        vol_spike:         { type: number, format: float, example: 1.4 }
        pct_today:         { type: number, format: float, example: 0.85 }

        buy:               { type: boolean, example: false }
        reason:            { type: string, example: "" }
        source:            { type: string, example: "scan" }
        stale:             { type: boolean, example: false }

        run_id:            { type: string, example: "20250910T153000Z" }
        as_of:             { type: string, format: date-time, example: "2025-09-10T15:30:00Z" }
        last_index:        { type: string, format: date, example: "2025-09-01" }


    ScreenerList:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ScreenerRow" }
        pagination:
          $ref: "#/components/schemas/Pagination"

    NextAction:
      type: object
      properties:
        action: { type: string, enum: [HOLD, BUY, TRIM, EXIT, TBD] }
        reason: { type: string }

    DrawerDetail:
      type: object
      properties:
        symbol: { $ref: '#/components/schemas/Symbol' }
        as_of: { type: string, format: date-time }
        run_id: { $ref: '#/components/schemas/RunId' }
        score: { $ref: '#/components/schemas/Score' }
        indicators:
          type: object
          additionalProperties: { type: number }
        badges:
          type: array
          items: { $ref: '#/components/schemas/Badge' }
        next_action: { $ref: '#/components/schemas/NextAction' }

    PriceCandle:
      type: object
      properties:
        dt: { type: string, format: date }
        open: { type: number }
        high: { type: number }
        low: { type: number }
        close: { type: number }
        volume: { type: number }

    IndicatorPoint:
      type: object
      properties:
        dt: { type: string, format: date }
        key: { type: string, enum: [rsi, adx, ema12, ema26, ema50, ema200, obv, relvol] }
        value: { type: number }

    AlertRule:
      type: object
      properties:
        symbol: { $ref: '#/components/schemas/Symbol' }
        enabled: { type: boolean }
        channels:
          type: object
          properties:
            email: { type: boolean }
            desktop: { type: boolean }
            whatsapp: { type: boolean }
        conditions:
          type: object
          additionalProperties: true
