app:
  name: momentum-dashboard
  env: development
  api_prefix: /api/v1
  timezone: Asia/Singapore
  backfill_on_start: true
server:
  host: 0.0.0.0
  port: 8000
  cors_origins:
  - http://localhost:5173
logging:
  level: DEBUG
  file: ./logs/app.log
  max_bytes: 10485760
  backup_count: 5
storage:
  sqlite_path: ./data/local.db
  parquet_root: ./backend/parquet
  compression: zstd
  use_dictionary: true
  write_statistics: true

backfill_runtime:
  intraday_retention_days: 15

screener:
  default_universe: ALL  #NIFTY50 ALL
scheduler:
  enabled: true
  interval_minutes: 15
  universe: null
  trading_window:
    tz: Asia/Kolkata
    days:
    - 0
    - 1
    - 2
    - 3
    - 4
    start: 09:15
    end: '15:30'
data:
  adapter: yahoo

rules:
  breakeven_gain_pct: 5.0
  atr_chand_mult: 2.0
  atr_chand_mult_euphoria: 1.4
  atr_init_mult: 2.0
  euphoria:
    rsi_min: 75
    adx_min: 30
    alt_rsi_min: 70
    alt_adx_min: 25
    adx_slope5_min: 0
  soft_gates:
    min_score: 35
    min_relvol20: 0.8
    min_adx14: 22
    min_prox52w_pct: -10
    require_base_len_bars: 15
    breakout_overrides_soft_gates: true
features:
  momentum:
    rules_version: 2025-10-12A
    liquidity:
      min_traded_value_20d: 100000000
    risk:
      max_atr14_pct: 8.0
      portfolio_risk_per_trade_pct: 0.5
      init_atr_multiple: 1.0
      trail_atr_multiple: 2.0
    price:
      min_close: 50
    scores:
      bands:
        ignore: 40
        watch: 55
        high: 69
        breakout: 78
        elite: 99
      prox52:
        fresh_high_pts: 12
      max_context_bonus: 5
      penalties:
        rsi_over_80: -3
        gap_weak_base: -2
        late_breakout_base: -2
    actions:
      breakout:
        min_relvol20: 1.5
        min_adx14: 25
        max_pivot_clear_pct: 5
        allow_consecutive_up_max: 2
        adaptive_proximity:
          base: -10.0
          floor: -12.0
          ceiling: -8.0
          long_base_bars: 20
          obv_bonus: 1.0
          adx_slope_bonus: 0.5
          recent_fail_penalty: 1.0
      pullback:
        min_relvol20: 1.2
        min_reversal_close_pos: 0.6
        ema10_atr_band: 1.5
      starter:
        min_adx14: 20
        min_relvol20: 1.8
        min_proximity_52w: -15
    india_safety:
      asm_gsm_symbols: []
  news:
    enabled: true
    ui:
      default_range: trading_day
      default_sort: impact_desc
      min_confidence_default: 1
      show_sector_macro: true
      right_drawer_hours: 168
news:
  enabled: false
  trading_timezone: Asia/Kolkata
  storage:
    parquet_root: data/parquet/news_clusters
    duckdb_path: data/index/news.duckdb
    partition_format: YYYY-MM-DD
    retention_days: 365
  ingest:
    accept_local_only: true
    require_token: false
    token_env: NEWS_INGEST_TOKEN
    upsert_on_cluster_id: true
  sources:
    official:
    - name: NSE Announcements
      type: rss
      url: https://www.nseindia.com/api/corporate-announcements?index=equities
      weight: 1.0
    - name: SEBI Press/Filings
      type: rss
      url: https://www.sebi.gov.in/sebiweb/rss/news.xml
      weight: 1.0
    media_sites:
    - domain: moneycontrol.com
      weight: 0.9
    - domain: livemint.com
      weight: 0.9
    - domain: economictimes.com
      weight: 0.9
    - domain: business-standard.com
      weight: 0.9
    - domain: financialexpress.com
      weight: 0.9
    - domain: cnbctv18.com
      weight: 0.9
    - domain: reuters.com
      weight: 0.95
    google_news:
      enabled: true
      sites:
      - moneycontrol.com
      - livemint.com
      - economictimes.com
      - business-standard.com
      - financialexpress.com
      - cnbctv18.com
      - reuters.com
      query_template: site:{site} ({symbol} OR {alias})
      max_per_site: 6
      lookback_minutes: 720
  extraction:
    user_agent: MomentumSuiteBot/1.0 (+local)
    connect_timeout_sec: 12
    read_timeout_sec: 20
    retries: 3
    allow_languages:
    - en
    readabilize: true
    keep_paywalled_title_only: true
  mapping:
    nse_master_csv: configs/nse_master.csv
    aliases_csv: configs/symbol_aliases.csv
    prefer_isin_for_filings: true
  clustering:
    method: minhash
    title_shingle_size: 3
    minhash_threshold: 0.82
    time_merge_window_min: 240
    max_cards_per_symbol_per_day: 24
  consensus:
    recency_decay:
      buckets:
      - max_min: 30
        factor: 1.0
      - max_min: 90
        factor: 0.8
      - max_min: 240
        factor: 0.5
      - max_min: 1440
        factor: 0.3
    citation_boost:
      per_unique_publisher: 0.1
      max_boost: 0.4
    confidence_stars:
      strong_official_plus_media:
        min_sources: 2
        stars: 3
      strong_media_only:
        min_sources: 3
        stars: 3
      medium:
        min_sources: 2
        stars: 2
      low:
        min_sources: 1
        stars: 1
  events:
    taxonomy:
    - results
    - order_win
    - pledge
    - rating_change
    - regulatory
    - court
    - mna
    - guidance
    - mgmt_change
    - macro
    - other
    boosts:
      results: 1.3
      regulatory: 1.3
      mna: 1.3
      order_win: 1.15
      pledge: 1.15
      rating_change: 1.1
      guidance: 1.1
      mgmt_change: 1.05
      macro: 1.05
      other: 1.0
  summarizer:
    engine: ollama
    model: llama3
    max_tokens: 320
    timeout_sec: 30
    retries: 2
    schema_validate: true
    adaptive_bullets:
      min: 2
      max: 5
      extend_if:
      - has_numbers
      - multi_source
      - complex_event
  attribution:
    lookback_min_default: 240
    thresholds:
      likely: 0.65
      possible: 0.45
    text_match:
      method: bm25
      min_score: 0.35
    correlation_band_min: -10
    correlation_band_max: 120
    fallback_if_no_catalyst: none
  run_modes:
    intraday:
      selection: watchlist + top_movers + score_threshold
      cohorts:
        watchlist:
          include: true
          also_include_active_trades: true
          also_include_visible_symbols: true
        top_movers:
          include: true
          from_latest_run: true
          top_gainers_count: 10
          top_losers_count: 10
          min_abs_change_pct: 1.0
          change_window_min: 15
        score_threshold:
          include: true
          score_type: full
          min_score: 70
          max_symbols: 100
      fetch:
        since: 10m
        symbol_cooldown_min: 20
        max_symbols_per_run: 250
        max_items_per_symbol: 8
        prioritize_order:
        - is_active_trade
        - is_top_mover
        - score_desc
        - abs_change_pct_desc
      fallbacks:
        if_no_latest_run: use_last_successful_run
        if_universe_too_large: raise_thresholds
        stale_minutes_ok: 30
    backfill:
      anchor_hour_ist: 0
      since_minutes: 1440
  backfill:
    enabled_on_app_start: true
    watermark_file: data/state/news_backfill.json
    holiday_calendar_file: config/nse_holidays.yaml
    retry_on_start_failure: true
  on_demand:
    max_symbols_per_run: 1200
    max_items_per_symbol: 50
  trigger:
    mode: after_scan
    require_fresh_scores: true
    max_scores_age_min: 20
    on_scan_success:
      run_intraday_news: true
      use_run_id_from_scan: true
  fallbacks:
    if_no_fresh_scores: manual_only
  http_client:
    headers:
      User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML,
        like Gecko) Chrome/120.0 Safari/537.36
      Accept: application/json, text/xml, */*;q=0.8
      Accept-Language: en-US,en;q=0.9
      Referer: https://www.nseindia.com/
    retry:
      attempts: 3
      backoff_sec: 2
      status_forcelist:
      - 401
      - 403
      - 429
      - 500
      - 502
      - 503
      - 504
alerts_config_path: ./alerts.yaml
