# ------------------------------------------------------------
# PORTFOLIO CONFIGURATION
# ------------------------------------------------------------
# Static configuration only. NAVs, returns and XIRR are CALCULATED at runtime
# (AMFI/mfapi.in for NAV history + data/portfolio_transactions.csv for your
# transactions). Never write current values into this file.
#
# amfi_scheme_code: set to the numeric AMFI code if you know it; leave null
# and the backend will resolve it by fuzzy-matching `amfi_name_hint` against
# the AMFI NAVAll list, then cache the result in data/mf_cache/.
# ------------------------------------------------------------

portfolio:
  base_currency: INR

accounts:
  - id: nre_primary
    label: NRE
  - id: nro_primary
    label: NRO
  - id: nre_sbi
    label: NRE-SBI

# Accumulation (dip-buying) engine settings — used by /portfolio/overview.
accumulation:
  drawdown_watch_pct: 5.0      # NAV this % below 1y high -> "watch"
  drawdown_tranche_pct: 10.0   # NAV this % below 1y high -> "tranche eligible"
  nav_cache_ttl_hours: 12

