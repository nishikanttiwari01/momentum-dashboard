version: 3
metadata:
  name: Momentum Suite — Full Defaults (Backend SSOT)
  last_updated: "2025-11-01"

# ------------------------------------------------------------
# APP / SERVER / LOGGING / STORAGE
# ------------------------------------------------------------
app:
  name: momentum-dashboard
  env: development
  api_prefix: /api/v1
  timezone: Asia/Singapore
  backfill_on_start: true

server:
  host: 0.0.0.0
  port: 8000
  cors_origins:
    - http://localhost:5173

logging:
  level: DEBUG
  file: ./logs/app.log
  max_bytes: 10485760
  backup_count: 5
  json: false

storage:
  sqlite_path: ./data/local.db
  parquet_root: ./backend/parquet
  compression: zstd
  use_dictionary: true
  write_statistics: true

backfill:
  export_utilities:
    enabled: false       # master switch for NDJSON exports (details + screener)
    details: false       # optional override to control details export
    screener: false      # optional override to control screener export

backfill_runtime:
  intraday_retention_days: 15
  daily_retention_days: 365

# ------------------------------------------------------------
# DATA / UNIVERSE / SCHEDULER
# ------------------------------------------------------------
screener:
  default_universe: ALL
  table_page_size: 100

scheduler:
  enabled: true
  interval_minutes: 15
  universe: null
  trading_window:
    tz: Asia/Kolkata
    days: [0,1,2,3,4]
    start: "09:15"
    end: "15:30"
  eod_job_time: "16:05"
  misfire_grace_seconds: 120

data:
  adapter: yahoo                 # yahoo | nse | mixed
  market: NSE
  holiday_calendar: NSE
  eod:
    lookback_days: 550
  intraday:
    enabled: true
    interval: "15m"
    lookback_days: 1
  retries:
    max_attempts: 3
    backoff_seconds: 2

# ------------------------------------------------------------
# NEWS INGEST
# ------------------------------------------------------------
# NOTE on shape (this matters):
#   The in-process news pipeline in `backend/app/pipeline/news_provider.py`
#   reads feeds out of `news.sources` as a DICT keyed by category
#   (`official`, `google_news`, optional `nse`), NOT the legacy
#   `news.providers` list. A mismatch here = zero hits ingested. If you're
#   adding a source, pick the right slot below.
news:
  enabled: false
  #refresh_minutes: ${NEWS_REFRESH_MINUTES:-60}   # scheduler polls this often
  refresh_minutes: 60
  since_days: 7
  trading_timezone: Asia/Kolkata
  #concurrency: ${NEWS_CONCURRENCY:-4}
  #shard_size: ${NEWS_SHARD_SIZE:-50}
  concurrency: 4
  shard_size: 50

  storage:
    parquet_root: data/parquet/news_clusters
    duckdb_path: data/index/news.duckdb
    partition_format: YYYY-MM-DD
    retention_days: 365

  ingest:
    accept_local_only: true
    require_token: false
    token_env: NEWS_INGEST_TOKEN
    upsert_on_cluster_id: true

  # ── SOURCES (dict, read by news_provider._collect_hits) ─────────────────
  sources:
    # RSS / JSON feeds we poll directly. `mode: rss` (default) or `nse_json`.
    official:
      - name: NSE Announcements
        mode: nse_json
        url: https://www.nseindia.com/api/corporate-announcements?index=equities
        weight: 1.0
      - name: SEBI Press/Filings
        mode: rss
        url: https://www.sebi.gov.in/sebiweb/rss/news.xml
        weight: 1.0
      - name: Economic Times Markets
        mode: rss
        url: https://economictimes.indiatimes.com/markets/rssfeeds/1977021501.cms
        weight: 0.9
      - name: Moneycontrol Business
        mode: rss
        url: https://www.moneycontrol.com/rss/business.xml
        weight: 0.9
      - name: Business Standard Markets
        mode: rss
        url: https://www.business-standard.com/rss/markets-106.rss
        weight: 0.9
      - name: Mint Markets
        mode: rss
        url: https://www.livemint.com/rss/markets
        weight: 0.9

    # Google News site-filter search (per-symbol query). Disable to cut
    # outbound QPS aggressively during market hours.
    google_news:
      enabled: true
      sites:
        - moneycontrol.com
        - livemint.com
        - economictimes.com
        - business-standard.com
        - financialexpress.com
        - cnbctv18.com
        - reuters.com
      query_template: "site:{site} ({symbol} OR {alias})"
      max_per_site: 6
      lookback_minutes: 720

  # Optional whitelist used by attribution/scoring; not required for ingest.
  sources_whitelist:
    - Reuters
    - Economic Times
    - Moneycontrol
    - Business Standard
    - Mint

  extraction:
    user_agent: MomentumSuiteBot/1.0 (+local)
    connect_timeout_sec: 12
    read_timeout_sec: 20
    retries: 3
    allow_languages: [en]
    readabilize: true
    keep_paywalled_title_only: true

  mapping:
    nse_master_csv: configs/nse_master.csv
    aliases_csv: configs/symbol_aliases.csv
    prefer_isin_for_filings: true

  clustering:
    method: minhash
    title_shingle_size: 3
    minhash_threshold: 0.82
    time_merge_window_min: 240
    max_cards_per_symbol_per_day: 24

  run_modes:
    intraday:
      cohorts:
        watchlist:
          include: true
        top_movers:
          include: true
          top_gainers_count: 10
          top_losers_count: 10
          min_abs_change_pct: 1.0
        score_threshold:
          include: true
          score_type: full
          min_score: 70
          max_symbols: 100
      fetch:
        since: 60m
        max_symbols_per_run: 250
        max_items_per_symbol: 8

  sentiment:
    enabled: true
    model: builtin
    positive_min: 0.2
    negative_max: -0.2

  routing:
    digest_include_top_per_symbol: 3
    digest_include_global_top: 10

# ------------------------------------------------------------
# STRATEGY — SINGLE SOURCE OF TRUTH
# ------------------------------------------------------------
india_safety:
  block_buy: false
  blocklist: []

rules:
  pre_gates:
    min_close: 50
    min_score: 35
    min_relvol20: 0.9
    min_adx14: 20
    min_prox52w_pct: -12
  euphoria:
    as_gate: false
    rsi_min: 75
    adx_min: 30
    alt_rsi_min: 70
    alt_adx_min: 25
    adx_slope5_min: 0
  risk:
    breakeven_gain_pct: 5.0
    atr_init_mult: 2.0
    atr_chand_mult: 2.0
    atr_chand_mult_euphoria: 1.4

profiles:
  buy:
    # EOD breakout profile (ALL 9 gates counted)
    swing_eod:
      enabled: true
      # thresholds — lowered score to 65 to catch setups earlier (was 70).
      # pivot_clear extended to -2% so we flag stocks approaching the breakout
      # before they've already run 4-6%; entry is at next-day open where the
      # actual break happens, so we want to be alerted *before* not *after*.
      min_score: 65
      prox52w_min_pct: -8
      pivot_clear_pct: [-2.0, 5.0]
      base_len_min_bars: 5
      relvol20_min: 1.2
      adx14_min: 22
      atr_pct: [2.0, 8.0]
      day_change_max_pct: 6.0
      liquidity_min_traded_value_20d: 50000000   # ₹5 Cr

      # BUY flag is TRUE only if ALL of these 9 pass:
      enforced_checks:
        - min_score
        - pivot_clear_pct
        - base_len_min_bars
        - prox52w_min_pct
        - relvol20_min
        - adx14_min
        - atr_pct
        - day_change_max_pct
        - liquidity_min_traded_value_20d

      # EOD persistence concept is OFF (intraday-only)
      persistence:
        require_above_vwap: false
        require_prev_day_high_clear: false
        min_minutes_since_open: 0
        avoid_lunch_window: false

    # Intraday breakout variant (8 gates counted incl. persistence)
    intraday_breakout:
      enabled: true
      # explicit keys for intraday (no inherit requirement)
      starter_score_min_intraday: 65
      prox52w_min_pct: -8
      intraday_relvol_min: 1.5
      adx14_min: 22
      atr_pct: [2.0, 8.0]
      day_change_max_pct: 5.0
      liquidity_min_traded_value_20d: 50000000   # ₹5 Cr

      # persistence composite gate
      persistence:
        require_above_vwap: true
        require_prev_day_high_clear: true
        min_minutes_since_open: 30
        avoid_lunch_window: true

      # BUY flag is TRUE only if ALL of these 8 pass:
      enforced_checks:
        - starter_score_min_intraday
        - intraday_relvol_min
        - adx14_min
        - prox52w_min_pct
        - atr_pct
        - day_change_max_pct
        - liquidity_min_traded_value_20d
        - persistence

  sell:
    common:
      stop:
        method: chandelier
        lookback_bars: 22
        atr_period: 10
        atr_multiple: 2.0
        atr_multiple_euphoria: 1.4
        floor_pct: null
      breakeven:
        enabled: true
        gain_pct: 5.0
        # retrace_to_pct = 0.03 locks in +3% once arm fires at +5%.
        # (Old value 0.0 = exact breakeven was too aggressive; any intraday
        # wick to entry price triggered exit even in healthy uptrends.)
        retrace_to_pct: 0.03
        intraday_enabled: true
      targets:
        # R-ratio based targets replace fixed %. Target = entry + risk * r_ratio.
        # With ATR stop at ~4-5% risk and r_ratio=2.0, target ≈ 8-10%.
        # t1_gain_pct is kept as a fallback if r_ratio_target is null.
        t1_gain_pct: 10.0
        t2_gain_pct: 15.0
        allow_intraday: true
        r_ratio_target: 2.0      # target = entry + 2 × risk (adaptive)
        r_ratio_target_t2: 3.0   # T2   = entry + 3 × risk
        t1_partial_exit_pct: 50.0  # sell 50% at T1, trail rest to breakeven
      weakness:
        enabled: true
        eod_only: true
        # EMA20 (was EMA10) is smoother — avoids premature exits on brief dips.
        # 3 consecutive closes (was 2) + relvol 1.5 (was 1.2) + must be below
        # entry to confirm real weakness, not just a mid-trend consolidation.
        fast_ema_period: 20
        max_closes_below_fast_ema: 3
        confirm_relvol_min: 1.5
      failed_breakout:
        enabled: true
        eod_only: true
        lookback_days: 5
        relvol_down_min: 1.2
      timeout:
        enabled: true
        eod_only: true
        max_holding_days: 20
      trail_update:
        enabled: true
        min_tick_move: 0.25
        route_alerts: false

# ------------------------------------------------------------
# SELECTION POLICY
# ------------------------------------------------------------
selection_policy:
  apply_at_buy: false
  apply_at_selection: true
  weekly_quota: 3
  max_open_positions: 5
  # Risk-based position sizing: each trade risks exactly this % of portfolio.
  # position_size = (portfolio * risk_pct_per_trade%) / (entry - stop).
  risk_pct_per_trade: 1.5
  # How many BUY_SELECTED picks a single scan can produce. Prior default of 1
  # was the "selection bottleneck" — a 5-slot book filled at most once per
  # scan, so even a strong setup day took multiple scans to fill.
  top_n_per_run: 2
  # Cap per-run picks from the same sector to prevent a single hot sector
  # (e.g. PSU Banks on a rally day) from crowding out diversification.
  max_per_sector_per_run: 1
  sector_cooldown_days: 5
  symbol_cooldown_days: 14
  regime:
    enabled: true
    index_symbol: "NIFTY_50"
    require_index_above_fast: true
    require_index_above_slow: false
    fast_ma_period: 50
    slow_ma_period: 200
    breadth:
      enabled: false
      min_ratio: 1.2
      lookback_days: 5
  tiebreaker: weighted_composite
  r_multiple:
    stop_from: "profiles.sell.common.stop"
    target_from: "profiles.sell.common.targets.t1_gain_pct"

candidate_pool:
  max_size: 10
  ranking:
    score_weight: 0.4
    r_multiple_weight: 0.3
    adx14_weight: 0.2
    prox52w_weight: 0.1
  exit_rules:
    max_age_days: 7
    min_adx14: 18
    min_prox52w_pct: -15.0
    require_above_ema20: true
  intraday_overrides:
    enabled: true
    intraday_relvol_min: 1.2
    starter_score_min_intraday: null
    persistence:
      require_above_vwap: true
      require_prev_day_high_clear: false
      min_minutes_since_open: 0
      avoid_lunch_window: false

# ------------------------------------------------------------
# SCORING COSMETICS (safe to keep; no UI logic in decisions)
# ------------------------------------------------------------
scores:
  bands:
    low: [0, 34]
    medium: [35, 69]
    high: [70, 100]
  penalties:
    euphoria_penalty: 5
  max_context_bonus: 5

segments:
  defaults: {}
  overrides: {}
