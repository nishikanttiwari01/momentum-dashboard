app:
  name: momentum-dashboard
  env: development
  api_prefix: /api/v1
  timezone: Asia/Singapore
  backfill_on_start: true

server:
  host: 0.0.0.0
  port: 8000
  cors_origins:
    - http://localhost:5173

logging:
  level: DEBUG
  file: ./logs/app.log
  max_bytes: 10485760
  backup_count: 5

storage:
  sqlite_path: ./data/local.db
  parquet_root: ./backend/parquet
  compression: zstd
  use_dictionary: true
  write_statistics: true

screener:
  default_universe: ALL

scheduler:
  enabled: true
  interval_minutes: 15
  universe: null

data:
  adapter: yahoo

alerts:
  enabled: true
  timezone: Asia/Singapore
  channels:
    telegram: true
    desktop: true
    ntfy: true
  ntfy:
    server: https://ntfy.sh
    topic: momentum-alerts-nishi
    token:
  rules:
    momentum_score_gte:
      threshold: 75
      repeat_policy: once_per_day
  throttle:
    min_minutes_between: 60
  dedupe:
    window_minutes: 180
  email:
    enabled: true                 # master switch
    on_backfill_digest: true      # toggle just the backfill summary
    include_trades: true
    smtp_host: smtp.gmail.com
    smtp_port: 587
    use_tls: true
    from_name: Momentum Suite
    username: nishikantworld@gmail.com
    password: tzrtcknnvhfqrzly  # use a Gmail App Password
    from_addr: nishikantworld@gmail.com
    # supports list OR comma-separated string
    to_list:
      - nishikantworld@gmail.com
      - nishikant.tiwari01@gmail.com
      - shashikantame@gmail.com 

rules:
  breakeven_gain_pct: 5.0
  atr_chand_mult: 2.0
  atr_chand_mult_euphoria: 1.4
  atr_init_mult: 2.0
  euphoria:
    rsi_min: 75
    adx_min: 30
    alt_rsi_min: 70
    alt_adx_min: 25
    adx_slope5_min: 0
  soft_gates:
    min_score: 35
    min_relvol20: 0.8
    min_adx14: 22
    min_prox52w_pct: -10
    require_base_len_bars: 15
    breakout_overrides_soft_gates: true
