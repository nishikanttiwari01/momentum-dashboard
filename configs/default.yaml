version: 3
metadata:
  name: Momentum Suite — Full Defaults (Backend SSOT)
  last_updated: "2025-11-01"

# ------------------------------------------------------------
# APP / SERVER / LOGGING / STORAGE
# ------------------------------------------------------------
app:
  name: momentum-dashboard
  env: development
  api_prefix: /api/v1
  timezone: Asia/Singapore
  backfill_on_start: true

server:
  host: 0.0.0.0
  port: 8000
  cors_origins:
    - http://localhost:5173

logging:
  level: DEBUG
  file: ./logs/app.log
  max_bytes: 10485760
  backup_count: 5
  json: false

storage:
  sqlite_path: ./data/local.db
  parquet_root: ./backend/parquet
  compression: zstd
  use_dictionary: true
  write_statistics: true

backfill_runtime:
  intraday_retention_days: 15
  daily_retention_days: 365

# ------------------------------------------------------------
# DATA / UNIVERSE / SCHEDULER
# ------------------------------------------------------------
screener:
  default_universe: ALL
  table_page_size: 100

scheduler:
  enabled: true
  interval_minutes: 15
  universe: null
  trading_window:
    tz: Asia/Kolkata
    days: [0,1,2,3,4]
    start: "09:15"
    end: "15:30"
  eod_job_time: "16:05"
  misfire_grace_seconds: 120

data:
  adapter: yahoo                 # yahoo | nse | mixed
  market: NSE
  holiday_calendar: NSE
  eod:
    lookback_days: 550
  intraday:
    enabled: true
    interval: "15m"
    lookback_days: 1
  retries:
    max_attempts: 3
    backoff_seconds: 2

# ------------------------------------------------------------
# NEWS INGEST
# ------------------------------------------------------------
news:
  enabled: false
  refresh_minutes: 60
  since_days: 7
  concurrency: ${NEWS_CONCURRENCY:-10}
  shard_size: ${NEWS_SHARD_SIZE:-50}
  providers:
    - name: google_news
      enabled: true
      lang: en
      country: in
    - name: nse_announcements
      enabled: true
  sources_whitelist:
    - Reuters
    - Economic Times
    - Moneycontrol
    - Business Standard
    - Mint
  sentiment:
    enabled: true
    model: builtin
    positive_min: 0.2
    negative_max: -0.2
  routing:
    digest_include_top_per_symbol: 3
    digest_include_global_top: 10

# ------------------------------------------------------------
# STRATEGY — SINGLE SOURCE OF TRUTH
# ------------------------------------------------------------
india_safety:
  block_buy: false
  blocklist: []

rules:
  pre_gates:
    min_close: 50
    min_score: 35
    min_relvol20: 0.9
    min_adx14: 20
    min_prox52w_pct: -12
  euphoria:
    as_gate: false
    rsi_min: 75
    adx_min: 30
    alt_rsi_min: 70
    alt_adx_min: 25
    adx_slope5_min: 0
  risk:
    breakeven_gain_pct: 5.0
    atr_init_mult: 2.0
    atr_chand_mult: 2.0
    atr_chand_mult_euphoria: 1.4

profiles:
  buy:
    # EOD breakout profile (ALL 9 gates counted)
    swing_eod:
      enabled: true
      # thresholds
      min_score: 70
      prox52w_min_pct: -8
      pivot_clear_pct: [-0.3, 6.0]
      base_len_min_bars: 5
      relvol20_min: 1.3
      adx14_min: 22
      atr_pct: [2.0, 8.0]
      day_change_max_pct: 6.0
      liquidity_min_traded_value_20d: 50000000   # ₹5 Cr

      # BUY flag is TRUE only if ALL of these 9 pass:
      enforced_checks:
        - min_score
        - pivot_clear_pct
        - base_len_min_bars
        - prox52w_min_pct
        - relvol20_min
        - adx14_min
        - atr_pct
        - day_change_max_pct
        - liquidity_min_traded_value_20d

      # EOD persistence concept is OFF (intraday-only)
      persistence:
        require_above_vwap: false
        require_prev_day_high_clear: false
        min_minutes_since_open: 0
        avoid_lunch_window: false

    # Intraday breakout variant (8 gates counted incl. persistence)
    intraday_breakout:
      enabled: true
      # explicit keys for intraday (no inherit requirement)
      starter_score_min_intraday: 65
      prox52w_min_pct: -8
      intraday_relvol_min: 1.5
      adx14_min: 22
      atr_pct: [2.0, 8.0]
      day_change_max_pct: 5.0
      liquidity_min_traded_value_20d: 50000000   # ₹5 Cr

      # persistence composite gate
      persistence:
        require_above_vwap: true
        require_prev_day_high_clear: true
        min_minutes_since_open: 30
        avoid_lunch_window: true

      # BUY flag is TRUE only if ALL of these 8 pass:
      enforced_checks:
        - starter_score_min_intraday
        - intraday_relvol_min
        - adx14_min
        - prox52w_min_pct
        - atr_pct
        - day_change_max_pct
        - liquidity_min_traded_value_20d
        - persistence

  sell:
    common:
      stop:
        method: chandelier
        lookback_bars: 22
        atr_period: 10
        atr_multiple: 2.0
        atr_multiple_euphoria: 1.4
        floor_pct: null
      breakeven:
        enabled: true
        gain_pct: 5.0
        retrace_to_pct: 0.10
        intraday_enabled: false
      targets:
        t1_gain_pct: 10.0
        t2_gain_pct: 15.0
        allow_intraday: true
      weakness:
        enabled: true
        eod_only: true
        fast_ema_period: 10
        max_closes_below_fast_ema: 2
        confirm_relvol_min: 1.2
      failed_breakout:
        enabled: true
        eod_only: true
        lookback_days: 5
        relvol_down_min: 1.2
      timeout:
        enabled: true
        eod_only: true
        max_holding_days: 20
      trail_update:
        enabled: true
        min_tick_move: 0.25
        route_alerts: false

# ------------------------------------------------------------
# SELECTION POLICY
# ------------------------------------------------------------
selection_policy:
  apply_at_buy: false
  apply_at_selection: true
  weekly_quota: 1
  max_open_positions: 5
  sector_cooldown_days: 10
  symbol_cooldown_days: 30
  regime:
    enabled: true
    index_symbol: "NIFTY_50"
    require_index_above_fast: true
    require_index_above_slow: false
    fast_ma_period: 50
    slow_ma_period: 200
    breadth:
      enabled: false
      min_ratio: 1.2
      lookback_days: 5
  tiebreaker: R_multiple_then_score
  r_multiple:
    stop_from: "profiles.sell.common.stop"
    target_from: "profiles.sell.common.targets.t1_gain_pct"

candidate_pool:
  max_size: 10
  ranking:
    score_weight: 0.4
    r_multiple_weight: 0.3
    adx14_weight: 0.2
    prox52w_weight: 0.1
  exit_rules:
    max_age_days: 7
    min_adx14: 18
    min_prox52w_pct: -15.0
    require_above_ema20: true
  intraday_overrides:
    enabled: true
    intraday_relvol_min: 1.2
    starter_score_min_intraday: null
    persistence:
      require_above_vwap: true
      require_prev_day_high_clear: false
      min_minutes_since_open: 0
      avoid_lunch_window: false

# ------------------------------------------------------------
# SCORING COSMETICS (safe to keep; no UI logic in decisions)
# ------------------------------------------------------------
scores:
  bands:
    low: [0, 34]
    medium: [35, 69]
    high: [70, 100]
  penalties:
    euphoria_penalty: 5
  max_context_bonus: 5

segments:
  defaults: {}
  overrides: {}
