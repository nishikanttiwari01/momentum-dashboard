app:
  name: momentum-dashboard
  env: development                  # overridden per profile
  port: 8000
  cors_allow_origins: ["http://localhost:5173"]
  timezone: UTC                     # server/scheduler TZ

storage:
  sqlite_path: "./data/local.db"
  parquet_dir: "./data/parquet"
  parquet_partitioning:
    prices: ["dt"]
    indicators: ["dt"]
    scores: ["run_id","dt"]
  snapshot_layout: "run_id/dt"      # enforced path template
  schema_versions: true
  compression: zstd
  write_temp_dir: "./data/tmp"      # atomic writes → rename
  file_lock_enabled: true

lineage:
  source_version: "1.0.0"           # manual bump per release
  schema_version: 1                 # Arrow schema version

universe:
  preset: NIFTY_500                 # NIFTY_50|NIFTY_100|NIFTY_500|MIDCAP|SMALLCAP|ALL|CUSTOM
  symbols_path: "seeds/universe.csv"      # used when preset=CUSTOM
  sector_map_path: "seeds/sector_map.csv" # optional sector mapping
  exclude_symbols: []                      # e.g., ["XYZ.BE"]

screening:
  universe: preset                   # preset | path
  compute:
    indicators: ["rsi","adx","ema","obv","relvol","proximity_52w"]
    scores: full                     # basic | full
  windows:
    rsi: 14
    adx: 14
    ema_fast: 12
    ema_slow: 26
    ema_medium: 50
    ema_long: 200
    relvol_lookback: 20
    proximity_52w_lookback_days: 252
  thresholds:
    rsi_overbought: 70
    rsi_oversold: 30
    adx_trend: 20
  write_mode: append                 # append | overwrite-day
  max_rows_per_page: 100
  hard_row_cap: 2000                 # server-side cap
  # Filtering DSL is implemented at API level (rsi.gt, adx.gt, etc.)

indicators:
  rsi:
    period: 14
    price_field: close
  adx:
    period: 14
  ema:
    periods: [12,26,50,200]
    price_field: close
  obv:
    price_field: close
  relvol:
    lookback: 20
  proximity_52w:
    lookback_days: 252

scoring:
  mode: full                         # basic | full
  weights:
    momentum_12_1m: 0.30
    momentum_6m: 0.20
    momentum_3m: 0.15
    momentum_1m: 0.10
    rsi_component: 0.10
    adx_component: 0.10
    volatility_penalty: -0.05
  cutoffs:
    buy_strong: 80
    buy: 65

drawer:
  sparkline_days: 120
  show_badges: true
  fields:
    - entry
    - stop_loss
    - exit_if
    - breakeven
    - euphoria
    - risk_meter
    - euphoria_meter
    - next_action
  include_trace: true                # surface run_id, as_of, symbol_canon
  # Tunables referenced in technical doc (used in domain logic)
  tunables:
    atr_init_mult: 2.0
    atr_chand_mult: 2.0
    atr_chand_mult_euphoria: 1.4    # 1.3–1.5 window
    breakeven_gain_pct: 5
    ema_momentum_period: 10
    ema_momentum_period_euphoria: 8
    euphoria_rsi: 80
    euphoria_adx: 45
    delta_adx_min: 0


watchlist:
  default_lists: ["My Watchlist"]

history:
  keep_days: 365

schedules:
  enabled: true
  jobs:
    scan_every_15m:                 # background recurring scan
      type: interval
      minutes: 15
      jitter_seconds: 60
      coalesce: true
      max_instances: 1
      timezone: UTC
    daily_digest:                   # optional example
      type: cron
      hour: [9, 15]
      minute: [0, 30]
      timezone: Asia/Singapore

notifications:
  smtp:
    enabled: true
    host: "localhost"
    port: 1025
    starttls: false
    username: ""
    password: ""
    from_email: "alerts@example.local"
  desktop:
    enabled: true
  whatsapp:
    enabled: false

performance:
  arrow_threads: 4
  batch_size: 100000
logging:
  level: DEBUG    #INFO
  file: ./logs/app.log        # string path
  max_bytes: 10485760         # 10 MB
  backup_count: 5

validation:
  config_schema_enforced: true      # reject unknown keys; validate on boot

screener:
  default_universe: "ALL" # NIFTY50|NIFTY100|NIFTY500|MIDCAP|SMALLCAP|ALL|CUSTOM

scheduler:
  enabled: true
  interval_minutes: 15
  universe: null

data:
  adapter: "yahoo"   # change to "yahoo" for live scans
alerts:
  enabled: true
  channels:
    telegram: true
    desktop: true
    ntfy: true
  ntfy:
    server: https://ntfy.sh
    topic: momentum-alerts-nishi
    token:    # leave empty unless your topic/server is protected
  rules:
    momentum_score_gte:
      threshold: 75         # accepts 80 or 800 (800 → normalized to 80)
      repeat_policy: once_per_day
  throttle:
    min_minutes_between: 60
  dedupe:
    window_minutes: 180

rules:
  breakeven_gain_pct: 5.0        # % gain to flip breakeven Active
  atr_chand_mult: 2.0            # chandelier K (normal)
  atr_chand_mult_euphoria: 1.4   # tighter K when euphoria is on
  atr_init_mult: 2.0             # pre-entry prospective stop calc

  euphoria:
    rsi_min: 75
    adx_min: 30
    alt_rsi_min: 70
    alt_adx_min: 25
    adx_slope5_min: 0            # >0 means rising

  soft_gates:
    min_score: 35
    min_relvol20: 0.8
    min_adx14: 22
    min_prox52w_pct: -10
    require_base_len_bars: 15    # used as a soft gate ONLY if breakout gateway fails
    breakout_overrides_soft_gates: true

BACKFILL_ON_START: 1
