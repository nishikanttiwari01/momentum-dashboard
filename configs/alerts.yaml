version: 3
metadata:
  name: Momentum Suite — Alerts & Routing (v3.2)
  last_updated: "2025-11-01"

delivery:
  email:
    enabled: true
    on_backfill_digest: true
    include_trades: true
    smtp:
      host: ${SMTP_HOST:-smtp.gmail.com}
      port: ${SMTP_PORT:-587}
      use_tls: true
      username: ${SMTP_USERNAME:-nishikantworld@gmail.com}
      password: ${SMTP_PASSWORD:-tzrtcknnvhfqrzly}
      from_name: ${SMTP_FROM_NAME:-Momentum Suite}
      from_addr: ${SMTP_FROM_ADDR:-nishikantworld@gmail.com}
    defaults:
      to:
        - ${ALERT_EMAIL_TO_1:-nishikant.tiwari01@gmail.com}

  ntfy:
    enabled: true
    server: ${NTFY_SERVER:-https://ntfy.sh}
    topic_high: ${NTFY_TOPIC_HIGH:-momentum-alerts-nishi}
    topic_low: ${NTFY_TOPIC_LOW:-momentum-alerts-nishi}

  # Windows desktop toast + sound. Only fires on Windows hosts; on Linux/macOS
  # it silently returns SKIPPED. Toggle at runtime without restart via
  # POST /api/v1/settings/windows-toast {"enabled": true|false}.
  windows_toast:
    enabled: ${WINDOWS_TOAST_ENABLED:-true}
    play_sound: true
    sound_alias: SystemAsterisk     # SystemExclamation | SystemHand | SystemDefault
    app_id: "Momentum Alerts"

topics:
  high_signal:
    # Desktop toast is included here so high-signal alerts (BUY_SELECTED,
    # SELL_STOP, etc.) pop a Windows notification with sound on the
    # operator's machine in addition to the usual ntfy push and email.
    channels: ["ntfy", "email", "windows_toast"]
  low_signal:
    channels: ["ntfy"]             # fyi/low-noise
  digest:
    channels: ["email"]            # keep digest email-only

# Per-alert routing (optional per-alert channels override the topic’s channels)
routes:
  # ---- BUY ----
  BUY_SIGNAL_EOD:
    enabled: true
    topic: low_signal
    # channels: ["ntfy"]          # override example (usually let topic decide)
    throttle: { per_symbol_cooldown_min: 60, per_event_cooldown_min: 0 }

  BUY_SIGNAL_INTRADAY:
    enabled: true
    topic: low_signal
    throttle: { per_symbol_cooldown_min: 30, per_event_cooldown_min: 0 }

  BUY_SELECTED:
    enabled: true
    topic: high_signal
    throttle: { per_symbol_cooldown_min: 1440 }

  CANDIDATE_POOL_EOD:
    enabled: true
    topic: low_signal
    channels: ["ntfy", "email"]
    throttle: { per_symbol_cooldown_min: 0, per_event_cooldown_min: 0 }

  # ---- PRE-BREAKOUT RADAR (PBSS) ----
  # Fires when institutional accumulation is detected BEFORE the buy flag triggers.
  # Gives 20-30 days advance warning before a potential 25%+ surge.
  PRE_BREAKOUT_WATCHLIST:
    enabled: true
    topic: high_signal
    channels: ["ntfy", "email", "windows_toast"]
    throttle: { per_symbol_cooldown_min: 4320 }   # 3-day cooldown to avoid repeat noise

  PRE_BREAKOUT_SURGE:
    enabled: true
    topic: high_signal
    channels: ["ntfy", "email", "windows_toast"]
    throttle: { per_symbol_cooldown_min: 2880 }   # 2-day cooldown for urgent surge alerts

  # ---- SELL ----
  SELL_STOP:
    enabled: true
    topic: high_signal
    throttle: { per_symbol_cooldown_min: 30 }

  SELL_TARGET_T1:
    enabled: true
    topic: high_signal
    throttle: { per_symbol_cooldown_min: 60 }

  SELL_TARGET_T2:
    enabled: true
    topic: high_signal
    throttle: { per_symbol_cooldown_min: 60 }

  SELL_WEAKNESS:
    enabled: true
    topic: low_signal
    throttle: { per_symbol_cooldown_min: 720 }

  SELL_FAILED_BREAKOUT:
    enabled: true
    topic: high_signal
    throttle: { per_symbol_cooldown_min: 1440 }

  SELL_TIMEOUT:
    enabled: true
    topic: high_signal
    throttle: { per_symbol_cooldown_min: 1440 }

  SELL_BREAKEVEN:
    enabled: true
    topic: digest               # this is informational; send via email/digest
    throttle: { per_symbol_cooldown_min: 1440 }

  SELL_TRAIL_UPDATE:
    enabled: false              # noisy; keep off unless you want state pings
    topic: low_signal
    throttle: { per_symbol_cooldown_min: 60 }

digest:
  eod:
    enabled: true
    schedule_local_time: "18:30"
    timezone: "Asia/Kolkata"
    include:
      top_gainers: 10
      top_losers: 10
      top_scores: 15
      buy_signals: true
      positions: true
      alerts_since_prev_digest: true
    sort:
      top_scores: ["score", "desc"]
  weekly:
    enabled: false

templates:
  ntfy:
    BUY_SELECTED:        "BUY SELECTED {{symbol}} @ {{entry_ref}} | Stop {{stop}} | R {{r_multiple|round(2)}}"
    BUY_SIGNAL_EOD:      "BUY (EOD) {{symbol}} | Score {{score}} | ADX {{adx14}} | RelVol20 {{relvol20}} | ATR% {{atr_pct}}"
    BUY_SIGNAL_INTRADAY: "BUY (INTRA) {{symbol}} | IntrRelVol {{intraday_relvol}} | ADX {{adx14}} | VWAP {{above_vwap}} | PDH {{prev_day_high_clear}}"

    SELL_STOP:           "SELL STOP {{symbol}} @ {{price}} | Stop {{stop}} | P/L {{pnl_pct}}%"
    SELL_TARGET_T1:      "SELL Target T1 {{symbol}} +{{t1}}% hit | P/L {{pnl_pct}}%"
    SELL_TARGET_T2:      "SELL Target T2 {{symbol}} +{{t2}}% hit | P/L {{pnl_pct}}%"
    SELL_FAILED_BREAKOUT: "SELL FAILED BO {{symbol}} < pivot {{pivot}} | DownRelVol {{relvol_down}} | P/L {{pnl_pct}}%"
    SELL_TIMEOUT:        "SELL TIMEOUT {{symbol}} after {{days_since_entry}}d | P/L {{pnl_pct}}%"
    SELL_WEAKNESS:       "SELL WEAKNESS {{symbol}} below EMA{{ema}} {{streak}} bars | RelVol {{relvol}} | P/L {{pnl_pct}}%"
    SELL_BREAKEVEN:      "SELL BREAKEVEN {{symbol}} retraced to entry | P/L {{pnl_pct}}%"
    SELL_TRAIL_UPDATE:   "SELL TRAIL UPDATE {{symbol}} -> {{stop}}"

    PRE_BREAKOUT_WATCHLIST: "WATCH {{symbol}} | PBSS {{pbss}} | Vol-Z {{vol_z20|round(1)}} | relvol {{relvol20|round(1)}}x | ret5d +{{ret_5d}}% | Score {{score}}"
    PRE_BREAKOUT_SURGE:     "SURGE ALERT {{symbol}} | PBSS {{pbss}} (43%+ prob) | Vol-Z {{vol_z20|round(1)}} | relvol {{relvol20|round(1)}}x | ret5d +{{ret_5d}}% | Score {{score}} | prox52 {{proximity_52w_high_pct|round(1)}}%"

  email:
    BUY_SELECTED:
      subject: "[BUY SELECTED] {{symbol}} @ {{entry_ref}} | Stop {{stop}} | R {{r_multiple|round(2)}}"
      body: |
        {{symbol}} — BUY SELECTED ({{profile}}) on {{as_of}}
        Entry ref: {{entry_ref}} ({{entry_context}})
        Stop: {{stop}} ({{stop_method}})
        Targets: T1 {{t1}} / T2 {{t2}}
        R multiple: {{r_multiple|round(2)}}
        Reasons: {{reasons_inline}}
        Run: {{run_id}}

    BUY_SIGNAL_EOD:
      subject: "[BUY CANDIDATE] {{symbol}} (EOD)"
      body: |
        {{symbol}} — BUY gate passed (EOD). Candidate, not selected yet.
        Score: {{score}} | ADX14: {{adx14}} | RelVol20: {{relvol20}} | ATR10%: {{atr_pct}}
        Pivot: {{pivot}} | Base: {{base_len_bars}} bars
        Reasons: {{reasons_inline}}
        Run: {{run_id}}

    BUY_SIGNAL_INTRADAY:
      subject: "[BUY CANDIDATE] {{symbol}} (Intraday)"
      body: |
        {{symbol}} — BUY gate passed (Intraday). Candidate, not selected yet.
        Score: {{score}} | ADX14: {{adx14}} | IntradayRelVol: {{intraday_relvol}}
        VWAP: {{above_vwap}} | PDH clear: {{prev_day_high_clear}}
        Reasons: {{reasons_inline}}
        Run: {{run_id}}

    PRE_BREAKOUT_WATCHLIST:
      subject: "[WATCH] {{symbol}} — Volume accumulation detected (PBSS {{pbss}})"
      body: |
        {{symbol}} — Institutional accumulation signal. Not yet a buy — monitor for entry.
        PBSS Score: {{pbss}} / 22  |  Hit rate at this level: ~12%  |  Avg gain: +8%
        Vol Z-score: {{vol_z20}} (>1.5 is significant)  |  RelVol: {{relvol20}}x
        5-day return: +{{ret_5d}}%  |  Score: {{score}}
        ADX: {{adx14}}  |  RSI: {{rsi14}}  |  Prox to 52W high: {{proximity_52w_high_pct}}%
        Pivot clear: {{pivot_clear_pct}}%  |  OBV above MA: {{obv_above_ma}}
        Sector: {{sector}}
        Reason: {{description}}
        As of: {{as_of}}  |  Run: {{run_id}}

    PRE_BREAKOUT_SURGE:
      subject: "[SURGE ALERT] {{symbol}} — High-conviction pre-breakout (PBSS {{pbss}}, 43% prob)"
      body: |
        {{symbol}} — HIGH-CONVICTION pre-breakout signal. Historically 43% chance of 25%+ gain in 1 month.
        PBSS Score: {{pbss}} / 22  |  Hit rate at this level: ~44%  |  Avg gain: +20%
        Vol Z-score: {{vol_z20}} (institutional surge)  |  RelVol: {{relvol20}}x
        5-day return: +{{ret_5d}}%  |  1-month return: {{ret_1m}}%  |  Score: {{score}}
        ADX: {{adx14}}  |  RSI: {{rsi14}}  |  Prox to 52W high: {{proximity_52w_high_pct}}%
        Pivot clear: {{pivot_clear_pct}}%  |  OBV above MA: {{obv_above_ma}}
        Sector: {{sector}}
        NOTE: This is a watchlist alert. Wait for buy_flag + buy profile before entering.
        Reason: {{description}}
        As of: {{as_of}}  |  Run: {{run_id}}

    CANDIDATE_POOL_EOD:
      subject: "[POOL EOD] {{as_of}} ({{pool_count}})"
      body: |
        Candidate pool snapshot for {{as_of}} ({{pool_count}} symbols)
        {% if pool_items and pool_items|length > 0 %}
        {% for item in pool_items %}
        #{{item.rank}} {{item.ticker}} | Score {{item.score_str}}
        {% endfor %}
        {% else %}
        No active candidates.
        {% endif %}
        Run: {{run_id}}

    SELL_STOP:
      subject: "[STOP] {{symbol}} hit stop @ {{price}}"
      body: |
        {{symbol}} — STOP triggered at {{price}} on {{as_of}}
        Last stop: {{stop}} ({{stop_method}})
        Entry: {{entry_price}} | P/L: {{pnl_pct}}%
        Run: {{run_id}}

    SELL_TARGET_T1:
      subject: "[T1] {{symbol}} hit +{{t1}}%"
      body: |
        {{symbol}} — Target T1 (+{{t1}}%) hit on {{as_of}}
        Entry: {{entry_price}} | Current: {{last_price}} | P/L: {{pnl_pct}}%
        Suggest: consider partial book / trail update
        Run: {{run_id}}

    SELL_TARGET_T2:
      subject: "[T2] {{symbol}} hit +{{t2}}%"
      body: |
        {{symbol}} — Target T2 (+{{t2}}%) hit on {{as_of}}
        Entry: {{entry_price}} | Current: {{last_price}} | P/L: {{pnl_pct}}%
        Action: consider full/major book
        Run: {{run_id}}

    SELL_FAILED_BREAKOUT:
      subject: "[FAILED BO] {{symbol}} lost pivot {{pivot}}"
      body: |
        {{symbol}} — Failed breakout: close < pivot {{pivot}} on {{as_of}}
        Volume (down): {{relvol_down}}
        Entry: {{entry_price}} | Current: {{last_price}} | P/L: {{pnl_pct}}%
        Run: {{run_id}}

    SELL_TIMEOUT:
      subject: "[TIMEOUT] {{symbol}} aged {{days_since_entry}}d"
      body: |
        {{symbol}} — Timeout exit after {{days_since_entry}} trading days
        Entry: {{entry_price}} | Current: {{last_price}} | P/L: {{pnl_pct}}%
        Run: {{run_id}}

    SELL_WEAKNESS:
      subject: "[WEAKNESS] {{symbol}} below EMA{{ema}} ({{streak}} bars)"
      body: |
        {{symbol}} — {{streak}} closes below EMA{{ema}} with relvol {{relvol}}
        Entry: {{entry_price}} | Current: {{last_price}} | P/L: {{pnl_pct}}%
        Run: {{run_id}}

throttle_defaults:
  per_symbol_cooldown_min: 10
  per_event_cooldown_min: 5
