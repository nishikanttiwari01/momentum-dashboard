app:
  env: test
  port: 0                           # ephemeral

schedules:
  enabled: false                    # disable background jobs in tests

logging:
  level: wARNING
  file: ./logs/app.log        # string path
  max_bytes: 10485760         # 10 MB
  backup_count: 5

performance:
  arrow_threads: 2                  # speed up CI runs
