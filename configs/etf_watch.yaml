# ------------------------------------------------------------
# ETF WATCH CONFIGURATION
# ------------------------------------------------------------
# Curated list of popular NSE-listed ETFs shown on the dashboard
# "ETF Momentum Watch" card. Prices/returns are fetched at runtime
# from Yahoo Finance (ticker = NSE symbol + ".NS") and cached in
# data/etf_cache/. Edit freely — the card ranks by recent momentum.
#
# Fields:
#   symbol   : NSE trading symbol (Yahoo ticker derived as SYMBOL.NS)
#   name     : display name
#   category : EQUITY_INDEX | EQUITY_SECTOR | EQUITY_FACTOR | INTERNATIONAL | COMMODITY
# ------------------------------------------------------------

etf_watch:
  cache_ttl_hours: 6
  rank_by: ret_3m_pct     # ret_1m_pct | ret_3m_pct | ret_6m_pct | ret_1y_pct
  top_n: 8                # how many rows the dashboard card shows

